<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE連携中... | オリパMAX</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#f0eadc;font-family:'Noto Sans JP',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.spinner{width:40px;height:40px;border:3px solid rgba(201,168,76,.2);border-top-color:#c9a84c;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.msg{font-size:.9rem;color:rgba(255,255,255,.6)}
.error{color:#ef4444;font-size:.88rem;text-align:center;max-width:300px;line-height:1.6}
</style>
</head>
<body>
<div class="spinner" id="spinner"></div>
<div class="msg" id="msg">LINE連携中...</div>
<div class="error" id="error" style="display:none"></div>

<script>
const SUPABASE_URL='https://puspoyandexokjtsmajc.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1c3BveWFuZGV4b2tqdHNtYWpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDA4MjU0MzEsImV4cCI6MjA1NjQwMTQzMX0.yOPdCMi5Bq3KJPb2HTXZ-4cFOxPjgIPkL0y4qVnFaxs';
const LINE_CLIENT_ID='2009627127';
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

async function handleCallback(){
  const params=new URLSearchParams(location.search);
  const code=params.get('code');
  const state=params.get('state');
  const error=params.get('error');

  if(error){
    showError('LINE認証がキャンセルされました');
    setTimeout(()=>location.href='/',2000);
    return;
  }

  if(!code){
    showError('認証コードが見つかりません');
    setTimeout(()=>location.href='/',2000);
    return;
  }

  // stateからユーザーIDを取得
  const savedState=sessionStorage.getItem('line_state');
  const userId=sessionStorage.getItem('line_user_id');
  if(state!==savedState||!userId){
    showError('セキュリティエラーが発生しました');
    setTimeout(()=>location.href='/',2000);
    return;
  }

  try{
    document.getElementById('msg').textContent='LINEアカウントを確認中...';

    // LINEのアクセストークンを取得
    const tokenRes=await fetch('https://api.line.me/oauth2/v2.1/token',{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams({
        grant_type:'authorization_code',
        code,
        redirect_uri:`${location.origin}/line-callback.html`,
        client_id:LINE_CLIENT_ID,
        client_secret:'2685ccf02cd1826302e01183b9cb6988',
      })
    });
    const tokenData=await tokenRes.json();
    if(!tokenData.access_token){
      showError('LINEトークンの取得に失敗しました');
      setTimeout(()=>location.href='/',2000);
      return;
    }

    // LINEプロフィールを取得
    const profileRes=await fetch('https://api.line.me/v2/profile',{
      headers:{Authorization:`Bearer ${tokenData.access_token}`}
    });
    const profile=await profileRes.json();
    const lineId=profile.userId;

    if(!lineId){
      showError('LINEプロフィールの取得に失敗しました');
      setTimeout(()=>location.href='/',2000);
      return;
    }

    // 同じLINE IDが既に別アカウントに紐付いていないか確認
    const{data:existing}=await db.from('users').select('id').eq('line_id',lineId).neq('id',userId).single();
    if(existing){
      showError('このLINEアカウントは既に別のアカウントに連携されています');
      setTimeout(()=>location.href='/',3000);
      return;
    }

    // LINE IDを保存
    const{error:updateError}=await db.from('users').update({
      line_id:lineId,
      line_linked_at:new Date().toISOString(),
    }).eq('id',userId);

    if(updateError){
      showError('連携の保存に失敗しました: '+updateError.message);
      setTimeout(()=>location.href='/',3000);
      return;
    }

    document.getElementById('spinner').style.display='none';
    document.getElementById('msg').textContent='✅ LINE連携が完了しました！';
    document.getElementById('msg').style.color='#4ade80';

    sessionStorage.removeItem('line_state');
    sessionStorage.removeItem('line_user_id');

    setTimeout(()=>location.href='/',2000);

  }catch(e){
    showError('エラーが発生しました: '+e.message);
    setTimeout(()=>location.href='/',3000);
  }
}

function showError(msg){
  document.getElementById('spinner').style.display='none';
  document.getElementById('msg').style.display='none';
  document.getElementById('error').style.display='block';
  document.getElementById('error').textContent='❌ '+msg;
}

handleCallback();
</script>
</body>
</html>
