<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>パスワードリセット | オリパMAX</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#fff;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#111118;border:1px solid rgba(201,168,76,.2);border-radius:16px;padding:32px 24px;width:100%;max-width:400px}
.logo{text-align:center;margin-bottom:24px;font-size:1.3rem;font-weight:900;background:linear-gradient(135deg,#fff8c0,#ffd700,#ffb300);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
h2{text-align:center;font-size:1.1rem;margin-bottom:24px;color:#fff}
input{width:100%;background:#1a1a2e;border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:14px;color:#fff;font-size:1rem;margin-bottom:12px;outline:none}
input:focus{border-color:rgba(201,168,76,.5)}
button{width:100%;background:linear-gradient(135deg,#c8860a,#ffd700);color:#1a0a00;font-size:1rem;font-weight:900;padding:14px;border-radius:10px;border:none;cursor:pointer;margin-top:4px}
.msg{text-align:center;margin-top:16px;font-size:.9rem}
.msg.success{color:#00cc66}
.msg.error{color:#ff4444}
</style>
</head>
<body>
<div class="card">
  <div class="logo">オリパMAX</div>
  <h2>🔑 新しいパスワードを設定</h2>
  <input type="password" id="new-pass" placeholder="新しいパスワード（6文字以上）">
  <input type="password" id="confirm-pass" placeholder="パスワードを確認">
  <button onclick="resetPassword()">パスワードを変更する</button>
  <div class="msg" id="msg"></div>
</div>

<script>
const SUPABASE_URL='https://puspoyandexokjtsmajc.supabase.co';
const SUPABASE_KEY='sb_publishable_C9BObAzp_hdjJts8ou0Lpw_3csDTCaW';
const{createClient}=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_KEY);

async function resetPassword(){
  const pass=document.getElementById('new-pass').value;
  const confirm=document.getElementById('confirm-pass').value;
  const msg=document.getElementById('msg');

  if(!pass||pass.length<6){msg.className='msg error';msg.textContent='パスワードは6文字以上で入力してください';return;}
  if(pass!==confirm){msg.className='msg error';msg.textContent='パスワードが一致しません';return;}

  const{error}=await db.auth.updateUser({password:pass});
  if(error){msg.className='msg error';msg.textContent='エラー: '+error.message;return;}

  msg.className='msg success';
  msg.textContent='✅ パスワードを変更しました！';
  setTimeout(()=>location.href='/',2000);
}
</script>
</body>
</html>
