<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>オリパMAX | ネットオリパ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
:root{
  --bg:#07080f;--bg2:#0d0f1c;--bg3:#131628;
  --gold:#c9a84c;--gold2:#e8c96a;--gold3:#f5e090;--gold-dark:#7a5c1e;
  --red:#c0392b;--red2:#e74c3c;
  --border:rgba(201,168,76,.12);--border2:rgba(201,168,76,.25);
  --text:#f0eadc;--text2:rgba(240,234,220,.6);--text3:rgba(240,234,220,.3);
}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:68px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 10%,rgba(201,168,76,.03) 0%,transparent 50%),radial-gradient(ellipse at 80% 90%,rgba(192,57,43,.03) 0%,transparent 50%);pointer-events:none;z-index:0}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:inherit;outline:none}
::-webkit-scrollbar{display:none}

/* TOAST */
#toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:rgba(13,15,28,.95);color:var(--gold2);padding:10px 22px;border-radius:999px;font-size:.82rem;font-weight:700;z-index:9999;opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap;border:1px solid var(--border2);box-shadow:0 4px 20px rgba(0,0,0,.5)}
#toast.show{opacity:1}

/* MAX COIN */
.max-coin{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:linear-gradient(145deg,var(--gold3),var(--gold),var(--gold-dark));box-shadow:0 2px 8px rgba(201,168,76,.4),inset 0 1px 0 rgba(255,255,255,.3);position:relative;flex-shrink:0}
.max-coin::before{content:'';position:absolute;inset:2px;border-radius:50%;border:1px solid rgba(255,255,255,.25)}
.max-coin-text{font-size:.38rem;font-weight:900;color:#1a0a00;position:relative;z-index:1;line-height:1}

/* HEADER */
.header{position:sticky;top:0;z-index:100;background:linear-gradient(180deg,rgba(7,8,15,.98),rgba(13,15,28,.96));border-bottom:1px solid var(--border2);height:58px;display:flex;align-items:center;padding:0 12px;gap:8px;backdrop-filter:blur(20px)}
.h-logo{font-size:1.4rem;font-weight:900;flex:1;display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--gold3),var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.04em}
.h-logo .logo-mark{background:linear-gradient(135deg,var(--gold),var(--gold-dark));-webkit-background-clip:unset;-webkit-text-fill-color:unset;color:#0a0a0a;font-size:.6rem;font-weight:900;padding:2px 6px;border-radius:3px;letter-spacing:.06em}
.h-cur{display:flex;align-items:center;gap:4px;background:rgba(201,168,76,.07);border-radius:999px;padding:5px 11px;cursor:pointer;border:1px solid var(--border2)}
.h-cur .cur-val{font-size:.85rem;font-weight:900;color:var(--gold2)}
.h-add-btn{background:linear-gradient(135deg,var(--red),var(--red2));color:#fff;width:20px;height:20px;border-radius:50%;font-size:.85rem;font-weight:900;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(192,57,43,.4)}
.h-notif{position:relative;background:none;padding:6px;color:var(--text3);font-size:1.2rem}
.h-notif-dot{position:absolute;top:4px;right:4px;width:7px;height:7px;background:var(--red2);border-radius:50%;border:1.5px solid var(--bg)}

/* BANNER */
.banners-wrap{overflow:hidden;position:relative}
.banners-track{display:flex;transition:transform .4s ease}
.banner-slide{flex-shrink:0;width:100%;min-height:100px;display:flex;align-items:center;padding:16px 18px;position:relative;overflow:hidden;cursor:pointer}
.banner-slide::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,0,0,.3),transparent)}
.banner-content{position:relative;z-index:1}
.banner-tag{font-size:.6rem;font-weight:900;color:var(--gold2);letter-spacing:.1em;margin-bottom:4px;text-transform:uppercase}
.banner-title{font-size:1.1rem;font-weight:900;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.5);line-height:1.2}
.banner-sub{font-size:.75rem;color:rgba(255,255,255,.7);margin-top:3px}
.banner-dots{display:flex;justify-content:center;gap:5px;padding:6px 0;background:rgba(0,0,0,.3)}
.banner-dot{width:5px;height:5px;border-radius:50%;background:var(--text3);transition:.2s}
.banner-dot.active{background:var(--gold);width:14px;border-radius:3px}

/* CAT TABS */
.cat-bar{position:sticky;top:58px;z-index:99;background:rgba(7,8,15,.96);backdrop-filter:blur(20px);display:flex;border-bottom:1px solid var(--border);overflow-x:auto;height:44px}
.cat-tab{flex-shrink:0;padding:0 16px;height:100%;display:flex;align-items:center;font-size:.85rem;font-weight:700;color:var(--text3);background:none;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:.15s;letter-spacing:.02em}
.cat-tab.active{color:var(--gold2);border-color:var(--gold)}

/* ALERT */
.alert-bar{background:linear-gradient(90deg,#1a0800,#2a1200,#1a0800);border-bottom:1px solid rgba(201,168,76,.2);padding:7px 12px;font-size:.78rem;font-weight:700;color:var(--gold2);display:flex;align-items:center;gap:5px}

/* LOGIN BONUS */
.login-bonus-bar{background:linear-gradient(90deg,#001a00,#003300,#001a00);border-bottom:1px solid rgba(0,200,80,.2);padding:8px 14px;font-size:.8rem;font-weight:700;color:#4ade80;display:flex;align-items:center;justify-content:space-between;cursor:pointer;display:none}
.lb-btn{background:rgba(0,200,80,.15);border:1px solid rgba(0,200,80,.3);border-radius:999px;padding:3px 12px;font-size:.72rem;font-weight:900;color:#4ade80}

/* WINS TICKER */
.wins-bar{background:rgba(201,168,76,.03);border-bottom:1px solid var(--border);padding:6px 0;overflow:hidden}
.wins-track{display:flex;animation:winscroll 22s linear infinite;white-space:nowrap}
.wins-item{display:inline-flex;align-items:center;gap:6px;padding:0 20px;font-size:.73rem;font-weight:700;color:rgba(201,168,76,.65)}
.wi-badge{font-size:.58rem;font-weight:900;padding:1px 5px;border-radius:2px}
.wi-sar{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0a0a0a}
.wi-sr{background:#6b21a8;color:#e9d5ff}
.wi-rr{background:#1e3a5f;color:#93c5fd}
@keyframes winscroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* SORT */
.sort-bar{background:rgba(13,15,28,.8);padding:8px 10px;display:flex;gap:6px;overflow-x:auto;border-bottom:1px solid var(--border)}
.sort-chip{flex-shrink:0;padding:5px 13px;border-radius:999px;font-size:.73rem;font-weight:700;background:rgba(201,168,76,.05);color:var(--text3);border:1px solid var(--border);transition:.15s}
.sort-chip.active{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0a0a0a;border-color:transparent;box-shadow:0 2px 10px rgba(201,168,76,.25)}

/* PACK CARD */
.packs-list{padding:10px}
.pack-card{background:linear-gradient(145deg,var(--bg2),var(--bg3));border:1px solid var(--border2);border-radius:16px;margin-bottom:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.4);cursor:pointer;transition:transform .12s;position:relative}
.pack-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,168,76,.02) 0%,transparent 60%);pointer-events:none;z-index:1}
.pack-card:active{transform:scale(.99)}
.pc-banner{width:100%;min-height:215px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end}
.pcb-bg{position:absolute;inset:0;z-index:0}
.pcb-bg::after{content:'';position:absolute;bottom:0;left:0;right:0;height:65%;background:linear-gradient(transparent,rgba(0,0,0,.75))}
.pcb-shine{position:absolute;inset:0;z-index:1;background:linear-gradient(135deg,rgba(255,255,255,.05) 0%,transparent 50%)}
.pcb-char{position:absolute;right:14px;bottom:50px;z-index:3;font-size:6rem;line-height:1;filter:drop-shadow(2px 8px 18px rgba(0,0,0,.6));animation:flt 3.5s ease-in-out infinite}
@keyframes flt{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-8px) rotate(2deg)}}
.pcb-content{position:relative;z-index:4;padding:12px 14px 10px;display:flex;flex-direction:column;gap:5px}
.pcb-ribbon{display:inline-flex;align-items:center;font-size:.62rem;font-weight:900;letter-spacing:.08em;padding:3px 16px 3px 8px;border-radius:2px;align-self:flex-start;clip-path:polygon(0 0,calc(100% - 6px) 0,100% 50%,calc(100% - 6px) 100%,0 100%)}
.ribbon-hot{background:linear-gradient(90deg,#7a0000,#c0392b);color:#ffe0e0}
.ribbon-new{background:linear-gradient(90deg,#003366,#0066cc);color:#e0f0ff}
.ribbon-limit{background:linear-gradient(90deg,#3d0066,#7b00cc);color:#f0e0ff}
.pcb-top-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.pcb-name{font-size:1.5rem;font-weight:900;color:#fff;line-height:1.15;text-shadow:1px 2px 8px rgba(0,0,0,.6)}
.pcb-series{font-size:.7rem;color:rgba(255,245,220,.6);margin-top:2px}
.pcb-rate{display:flex;flex-direction:column;align-items:center;background:rgba(0,0,0,.5);border:1.5px solid rgba(201,168,76,.45);border-radius:8px;padding:5px 10px;flex-shrink:0;backdrop-filter:blur(8px);min-width:62px}
.pcb-rate-label{font-size:.5rem;color:rgba(201,168,76,.8);font-weight:700;letter-spacing:.06em}
.pcb-rate-num{font-size:1.55rem;font-weight:900;line-height:1;color:var(--gold2);text-shadow:0 0 12px rgba(201,168,76,.4)}
.pcb-rate-unit{font-size:.55rem;color:rgba(201,168,76,.7);font-weight:700}
.pcb-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:2px}
.pcb-chip{display:flex;align-items:center;gap:4px;background:rgba(0,0,0,.4);border:1px solid rgba(201,168,76,.2);border-radius:999px;padding:3px 10px;backdrop-filter:blur(4px)}
.pcb-chip span{font-size:.65rem;font-weight:700;color:rgba(255,240,200,.85)}
.pcb-tiers{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px}
.tier-pill{font-size:.58rem;font-weight:900;padding:2px 8px;border-radius:2px}
.tp-s{background:rgba(201,168,76,.15);color:var(--gold2);border:1px solid rgba(201,168,76,.3)}
.tp-a{background:rgba(139,92,246,.15);color:#c4b5fd;border:1px solid rgba(139,92,246,.3)}
.tp-b{background:rgba(59,130,246,.1);color:#93c5fd;border:1px solid rgba(59,130,246,.25)}
.tp-c{background:rgba(255,255,255,.05);color:var(--text3);border:1px solid rgba(255,255,255,.1)}
.pc-bottom{padding:10px 14px 14px}
.pc-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.pc-price{font-size:1.2rem;font-weight:900;color:var(--gold2)}
.pc-price-unit{font-size:.68rem;color:var(--text3);font-weight:700}
.pc-remain{font-size:.75rem;font-weight:700;color:var(--text2)}
.pc-remain b{color:var(--red2)}
.progress-bg{background:rgba(255,255,255,.06);border-radius:999px;height:5px;overflow:hidden;margin-bottom:11px}
.progress-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--gold-dark),var(--gold),var(--gold2));position:relative;overflow:hidden;transition:.5s}
.progress-fill.warn{background:linear-gradient(90deg,#7a3300,#cc5500)}
.progress-fill.danger{background:linear-gradient(90deg,#7a0000,#c0392b)}
.progress-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);animation:shimmer 2s infinite}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(200%)}}
.pc-btns{display:flex;gap:8px}
.pc-btn-1{flex:1;padding:13px 6px;border-radius:10px;font-size:.95rem;font-weight:900;background:linear-gradient(160deg,var(--gold2),var(--gold),var(--gold-dark));color:#0a0a0a;box-shadow:0 4px 16px rgba(201,168,76,.25),inset 0 1px 0 rgba(255,255,255,.2);letter-spacing:.02em;transition:.1s;position:relative;overflow:hidden}
.pc-btn-1::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.15) 0%,transparent 55%)}
.pc-btn-1:active{transform:scale(.97)}
.pc-btn-5{flex:1;padding:13px 6px;border-radius:10px;font-size:.95rem;font-weight:900;background:linear-gradient(160deg,#e74c3c,#c0392b,#922b21);color:#fff;box-shadow:0 4px 16px rgba(192,57,43,.25),inset 0 1px 0 rgba(255,255,255,.12);letter-spacing:.02em;transition:.1s;position:relative;overflow:hidden}
.pc-btn-5::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.1) 0%,transparent 55%)}
.pc-btn-5:active{transform:scale(.97)}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;flex-direction:column;gap:16px}
.spinner{width:36px;height:36px;border-radius:50%;border:3px solid rgba(201,168,76,.15);border-top-color:var(--gold);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.show{opacity:1;pointer-events:all}
.bottom-sheet{background:linear-gradient(180deg,var(--bg3),var(--bg2));border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:0 0 28px;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:92vh;overflow-y:auto;border-top:1px solid var(--border2)}
.modal-overlay.show .bottom-sheet{transform:translateY(0)}
.bs-drag{width:40px;height:4px;background:rgba(201,168,76,.2);border-radius:2px;margin:14px auto 0}
.bs-hero{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.bs-hero-icon{font-size:2.4rem}
.bs-pack-name{font-size:1.05rem;font-weight:900;color:var(--text)}
.bs-pack-series{font-size:.74rem;color:var(--text3);margin-top:2px}
.bs-section-label{padding:12px 16px 6px;font-size:.65rem;font-weight:900;letter-spacing:.1em;color:var(--text3);text-transform:uppercase}
.bs-prizes{display:flex;flex-wrap:wrap;gap:6px;padding:0 16px 12px;border-bottom:1px solid var(--border)}
.bs-prize{background:rgba(201,168,76,.05);border:1px solid var(--border);border-radius:7px;padding:5px 10px;display:flex;align-items:center;gap:6px}
.bsp-tier{font-size:.58rem;font-weight:900;padding:1px 5px;border-radius:2px}
.bsp-s{background:rgba(201,168,76,.2);color:var(--gold2);border:1px solid rgba(201,168,76,.3)}
.bsp-a{background:rgba(139,92,246,.15);color:#c4b5fd;border:1px solid rgba(139,92,246,.3)}
.bsp-b{background:rgba(59,130,246,.1);color:#93c5fd;border:1px solid rgba(59,130,246,.25)}
.bsp-c{background:rgba(255,255,255,.05);color:var(--text3);border:1px solid var(--border)}
.bsp-name{font-size:.76rem;font-weight:700;color:var(--text)}
.bsp-cnt{font-size:.65rem;color:var(--text3)}
.count-opts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;padding:8px 16px 12px;border-bottom:1px solid var(--border)}
.count-opt{background:rgba(201,168,76,.04);border:1.5px solid var(--border);border-radius:10px;padding:10px 5px;text-align:center;cursor:pointer;transition:.15s}
.count-opt.sel{border-color:var(--gold);background:rgba(201,168,76,.08)}
.co-num{font-size:1.6rem;font-weight:900;color:var(--gold2);line-height:1}
.co-price{font-size:.7rem;color:var(--text2);margin-top:2px;font-weight:700}
.co-bonus{font-size:.58rem;color:#4ade80;font-weight:800;margin-top:1px}
.bs-draw-btn{margin:10px 16px 0;width:calc(100% - 32px);background:linear-gradient(160deg,#e74c3c,#c0392b);color:#fff;font-size:1rem;font-weight:900;padding:14px;border-radius:12px;box-shadow:0 4px 16px rgba(192,57,43,.3);letter-spacing:.02em;transition:.1s}
.bs-draw-btn:active{transform:scale(.98)}
.bs-cancel-btn{width:100%;padding:12px;margin-top:6px;background:none;color:var(--text3);font-size:.85rem;font-weight:700}

/* 天井 */
.tenjo-modal{background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:10px 14px;margin:8px 16px;font-size:.78rem}
.tenjo-modal-label{font-weight:900;color:#93c5fd;margin-bottom:4px}
.tenjo-modal-bar{background:rgba(59,130,246,.1);border-radius:999px;height:5px;overflow:hidden;margin-bottom:4px}
.tenjo-modal-fill{height:100%;background:linear-gradient(90deg,#1e40af,#3b82f6);border-radius:999px;transition:.3s}
.tenjo-modal-sub{font-size:.7rem;color:#93c5fd}

/* AUTH */
.auth-sheet{max-height:88vh}
.auth-tabs{display:flex;border-bottom:1px solid var(--border)}
.auth-tab{flex:1;padding:12px;text-align:center;font-size:.9rem;font-weight:700;color:var(--text3);background:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s}
.auth-tab.active{color:var(--gold2);border-color:var(--gold)}
.auth-form{padding:16px}
.auth-label{font-size:.72rem;font-weight:700;color:var(--text3);margin-bottom:4px;display:block;letter-spacing:.05em}
.auth-input{width:100%;padding:11px 14px;border:1.5px solid var(--border2);border-radius:10px;font-size:.9rem;color:var(--text);background:rgba(201,168,76,.04);transition:.2s;margin-bottom:12px}
.auth-input:focus{border-color:var(--gold)}
.auth-submit{width:100%;padding:13px;border-radius:10px;background:linear-gradient(135deg,var(--gold2),var(--gold),var(--gold-dark));color:#0a0a0a;font-size:.95rem;font-weight:900;margin-top:4px;transition:.1s;box-shadow:0 4px 16px rgba(201,168,76,.25)}
.auth-submit:active{transform:scale(.98)}
.auth-forgot{text-align:center;margin-top:10px;font-size:.78rem;color:var(--text3);cursor:pointer;text-decoration:underline}

/* PURCHASE */
.plan-item{display:flex;align-items:center;justify-content:space-between;background:rgba(201,168,76,.04);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:.15s}
.plan-item.popular{border-color:var(--gold);background:rgba(201,168,76,.08)}
.plan-jp{font-size:1.1rem;font-weight:900;color:var(--text)}
.plan-bonus{font-size:.7rem;color:#4ade80;font-weight:700;margin-top:1px}
.plan-badge{background:var(--red2);color:#fff;font-size:.55rem;font-weight:900;padding:1px 5px;border-radius:2px;margin-left:6px}
.plan-price{font-size:.95rem;font-weight:900;color:var(--gold2);text-align:right}

/* GACHA SCREEN */
.gacha-screen{position:fixed;inset:0;z-index:500;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;opacity:0;pointer-events:none;transition:.3s;overflow:hidden}
.gacha-screen.show{opacity:1;pointer-events:all}
.gacha-stage{position:relative;z-index:10;width:280px;height:280px;display:flex;align-items:center;justify-content:center}
.gacha-pack{width:160px;height:200px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:5rem;position:relative;transition:all .3s}
.gacha-video-wrap{position:absolute;inset:0;z-index:5;display:none}
.gacha-video-wrap video{width:100%;height:100%;object-fit:cover;border-radius:12px}
.gacha-pack.col-white{background:linear-gradient(145deg,#1a1a2e,#2a2a40);color:rgba(255,255,255,.3);box-shadow:0 0 20px rgba(200,200,200,.1)}
.gacha-pack.col-blue{background:linear-gradient(145deg,#0a1a3a,#0a2a6a);color:#4488ff;box-shadow:0 0 30px rgba(68,136,255,.4)}
.gacha-pack.col-green{background:linear-gradient(145deg,#0a2a0a,#0a5a0a);color:#00cc44;box-shadow:0 0 30px rgba(0,200,60,.4)}
.gacha-pack.col-red{background:linear-gradient(145deg,#2a0a0a,#5a0a0a);color:#ff4444;box-shadow:0 0 40px rgba(255,60,60,.5)}
.gacha-pack.col-gold{background:linear-gradient(145deg,#2a1a00,#5a3a00);color:var(--gold2);box-shadow:0 0 50px rgba(201,168,76,.6)}
.gacha-pack.col-rainbow{background:linear-gradient(145deg,#1a0040,#400010,#002040,#004020,#402000);color:#fff;animation:rainbow-glow 1s infinite}
@keyframes rainbow-glow{0%{box-shadow:0 0 60px rgba(255,0,0,.6)}25%{box-shadow:0 0 60px rgba(201,168,76,.6)}50%{box-shadow:0 0 60px rgba(0,255,100,.6)}75%{box-shadow:0 0 60px rgba(0,100,255,.6)}100%{box-shadow:0 0 60px rgba(255,0,255,.6)}}

<script>
/* ══ SUPABASE ══ */
async function fetchPacks(){
  const{data}=await db.from('packs').select('*,prizes(*)').eq('is_active',true).order('sort_order');
  return data||[];
}
async function fetchBanners(){
  const{data}=await db.from('banners').select('*').eq('is_active',true).order('sort_order');
  return data||[];
}
async function fetchNotices(){
  const{data}=await db.from('notices').select('*').eq('is_active',true).order('created_at',{ascending:false});
  return data||[];
}
async function fetchVideos(){
  const{data}=await db.from('gacha_videos').select('*').eq('is_active',true);
  return data||[];
}
async function checkSession(){
  const{data:{session}}=await db.auth.getSession();
  if(session){state.session=session;await loadUserProfile(session.user.id);}
}
async function loadUserProfile(userId){
  const{data:profile}=await db.from('users').select('*').eq('id',userId).single();
  if(!profile)return;
  state.user=profile;
  state.coin=profile.coin_points||0;
  state.dp=profile.dp_points||0;
  state.totalSpent=profile.total_spent||0;
  const{rank}=getRankInfo(state.totalSpent);
  state.rank=rank.name;
  updateHeaderPts();
  checkLoginBonus();
  if(!state.user.referral_code){
    const code=generateCode();
    await db.from('users').update({referral_code:code}).eq('id',userId);
    state.user.referral_code=code;
  }
}

/* ══ AUTH ══ */
async function doLogin(){
  const email=document.getElementById('login-email').value;
  const pass=document.getElementById('login-pass').value;
  if(!email||!pass){showToast('⚠️ 入力してください');return;}
  showToast('ログイン中...');
  const{data,error}=await db.auth.signInWithPassword({email,password:pass});
  if(error){showToast('⚠️ '+error.message);return;}
  state.session=data.session;
  await loadUserProfile(data.user.id);
  await loadHistoryFromDB();
  await loadTenjoFromDB();
  closeAllModals();showToast('✅ ログインしました！');
}
async function doRegister(){
  const name=document.getElementById('reg-name').value;
  const email=document.getElementById('reg-email').value;
  const pass=document.getElementById('reg-pass').value;
  const birth=document.getElementById('reg-birth').value;
  const referral=document.getElementById('reg-referral').value;
  if(!name||!email||!pass||!birth){showToast('⚠️ 全項目を入力してください');return;}
  const age=Math.floor((Date.now()-new Date(birth))/(365.25*24*3600*1000));
  if(age<18){showToast('⚠️ 18歳未満は利用できません');return;}
  showToast('登録中...');
  const{data,error}=await db.auth.signUp({email,password:pass});
  if(error){showToast('⚠️ '+error.message);return;}
  let bonusCoin=500;
  if(referral){
    const{data:refUser}=await db.from('users').select('id,coin_points').eq('referral_code',referral).single();
    if(refUser){
      bonusCoin+=300;
      await db.from('users').update({coin_points:(refUser.coin_points||0)+500}).eq('id',refUser.id);
    }
  }
  const refCode=generateCode();
  await db.from('users').insert({
    id:data.user.id,email,username:name,
    password_hash:'supabase_auth',coin_points:bonusCoin,
    birth_date:birth,referral_code:refCode,
  });
  state.session=data.session;
  await loadUserProfile(data.user.id);
  closeAllModals();
  showToast(`🎉 登録完了！${bonusCoin}コインプレゼント！`,3000);
}
async function doForgotPassword(){
  const email=prompt('登録済みのメールアドレスを入力:');
  if(!email)return;
  await db.auth.resetPasswordForEmail(email,{redirectTo:'https://oripa-max.netlify.app'});
  showToast('📧 パスワードリセットメールを送信しました',3000);
}
async function doLogout(){
  await db.auth.signOut();
  state.user=null;state.coin=0;state.dp=0;
  updateHeaderPts();renderMyPage();showToast('ログアウトしました');
}

/* ══ BANNERS ══ */
let bannerIdx=0,bannerTimer=null;
async function loadBanners(){
  const banners=await fetchBanners();
  state.banners=banners;
  if(!banners.length)return;
  document.getElementById('banners-section').style.display='block';
  const track=document.getElementById('banners-track');
  const dots=document.getElementById('banner-dots');
  track.innerHTML=banners.map(b=>`
    <div class="banner-slide" style="background:${b.bg_style||'linear-gradient(135deg,#1a0040,#0a0020)'}" onclick="location.href='${b.link_url||'#'}'">
      <div class="banner-content">
        ${b.tag_text?`<div class="banner-tag">${b.tag_text}</div>`:''}
        <div class="banner-title">${b.title||''}</div>
        ${b.sub_text?`<div class="banner-sub">${b.sub_text}</div>`:''}
      </div>
    </div>`).join('');
  dots.innerHTML=banners.map((_,i)=>`<div class="banner-dot ${i===0?'active':''}" onclick="goBanner(${i})"></div>`).join('');
  if(banners.length>1){
    bannerTimer=setInterval(()=>goBanner((bannerIdx+1)%banners.length),4000);
  }
}
function goBanner(idx){
  bannerIdx=idx;
  document.getElementById('banners-track').style.transform=`translateX(-${idx*100}%)`;
  document.querySelectorAll('.banner-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
}

/* ══ NOTICES ══ */
async function loadNotices(){
  const notices=await fetchNotices();
  state.notices=notices;
  if(notices.length>0){
    const seen=localStorage.getItem('notices_seen');
    if(seen!==notices[0]?.id){
      document.getElementById('notice-badge').style.display='block';
      document.getElementById('notice-badge').textContent=notices.length;
      document.getElementById('notif-dot').style.display='block';
    }
  }
}
function renderNotices(){
  const notices=state.notices;
  const list=document.getElementById('notices-list');
  if(!notices.length){
    list.innerHTML='<div style="text-align:center;padding:40px;color:var(--text3)">お知らせはありません</div>';
    return;
  }
  list.innerHTML=notices.map(n=>`
    <div class="notice-item">
      <span class="notice-type nt-${n.type||'info'}">${n.type==='campaign'?'キャンペーン':n.type==='system'?'システム':'お知らせ'}</span>
      <div class="notice-title">${n.title||''}</div>
      <div class="notice-body">${n.body||''}</div>
      <div class="notice-time">${new Date(n.created_at).toLocaleDateString('ja-JP')}</div>
    </div>`).join('');
  if(notices.length>0)localStorage.setItem('notices_seen',notices[0].id);
  document.getElementById('notice-badge').style.display='none';
  document.getElementById('notif-dot').style.display='none';
}

/* ══ VIDEOS ══ */
async function loadVideos(){
  const videos=await fetchVideos();
  state.videos=videos;
}
function getVideoForTier(tier){
  const v=state.videos.find(v=>v.tier===tier&&v.is_default&&v.video_url);
  if(!v)state.videos.find(v=>v.tier==='all'&&v.video_url);
  return v?.video_url||null;
}

/* ══ LOGIN BONUS ══ */
async function checkLoginBonus(){
  if(!state.user)return;
  const today=new Date().toDateString();
  const last=localStorage.getItem(`lb_${state.user.id}`);
  if(last!==today)document.getElementById('login-bonus-wrap').style.display='flex';
}
async function claimLoginBonus(){
  if(!state.user){document.getElementById('auth-modal').classList.add('show');return;}
  const today=new Date().toDateString();
  if(localStorage.getItem(`lb_${state.user.id}`)===today){showToast('本日はすでに受け取り済みです');return;}
  state.coin+=100;
  await db.from('users').update({coin_points:state.coin}).eq('id',state.user.id);
  await db.from('transactions').insert({user_id:state.user.id,type:'bonus',amount:100,currency:'coin',description:'ログインボーナス'}).catch(()=>{});
  localStorage.setItem(`lb_${state.user.id}`,today);
  document.getElementById('login-bonus-wrap').style.display='none';
  updateHeaderPts();
  showToast('🎁 ログインボーナス！100コインを受け取りました！',3000);
}

/* ══ GACHA 演出 ══ */
const rfClass={sar:'rf-sar',sr:'rf-sr',rr:'rf-rr',r:'rf-r',c:'rf-c'};
const rarLabel={sar:'SAR ✨',sr:'SR 💜',rr:'RR 💙',r:'R',c:'C'};
const tierPillClass={sar:'tp-s',sr:'tp-a',rr:'tp-b',r:'tp-c',c:'tp-c'};
const ribbonClass={hot:'ribbon-hot',new:'ribbon-new',limit:'ribbon-limit'};
const TIER_TO_COLOR={c:'white',r:'blue',rr:'green',sr:'red',sar:'gold'};
let gachaResults=[],gachaSkipped=false;

function getTierColor(tier){
  if(tier==='sar')return Math.random()<0.3?'rainbow':'gold';
  return TIER_TO_COLOR[tier]||'white';
}

function startGachaAnimation(results,pack){
  gachaResults=results;gachaSkipped=false;
  const topTier=results.reduce((best,r)=>{
    const order={c:0,r:1,rr:2,sr:3,sar:4};
    return(order[r.prize.tier]||0)>(order[best]||0)?r.prize.tier:best;
  },'c');
  const finalColor=getTierColor(topTier);
  const videoUrl=getVideoForTier(topTier);
  document.getElementById('gacha-screen').classList.add('show');
  if(videoUrl){
    runVideoSequence(videoUrl,results,pack,topTier);
  } else {
    runColorSequence(finalColor,topTier,results,pack);
  }
}

async function runVideoSequence(videoUrl,results,pack,topTier){
  const vw=document.getElementById('gacha-video-wrap');
  const vid=document.getElementById('gacha-video');
  const packEl=document.getElementById('gacha-pack');
  vid.src=videoUrl;
  vw.style.display='block';
  packEl.style.display='none';
  document.getElementById('gacha-label-main').textContent='開封中...';
  vid.play().catch(()=>{});
  vid.onended=()=>{
    vw.style.display='none';
    packEl.style.display='flex';
    if(!gachaSkipped)showGachaResult(results,pack,topTier);
  };
}

async function runColorSequence(finalColor,topTier,results,pack){
  const label=document.getElementById('gacha-label-main');
  const sub=document.getElementById('gacha-label-sub');
  document.getElementById('gacha-pack').textContent=state.activePack?.emoji||'🎴';
  setPackColor('white');
  label.textContent='抽選中...';sub.textContent='運命の瞬間';
  await sleep(600);
  const t=Math.random();
  if(t<0.3)await puchunSequence(finalColor,topTier,label,sub);
  else if(t<0.5&&['sr','sar'].includes(topTier))await rewindSequence(finalColor,topTier,label,sub);
  else await normalSequence(finalColor,topTier,label,sub);
  if(!gachaSkipped){await sleep(500);showGachaResult(results,pack,topTier);}
}

async function normalSequence(finalColor,topTier,label,sub){
  const colorOrder=['white','blue','green','red','gold','rainbow'];
  const finalIdx=colorOrder.indexOf(finalColor);
  for(let i=0;i<=finalIdx;i++){
    if(gachaSkipped)return;
    setPackColor(colorOrder[i]);
    label.textContent=getColorLabel(colorOrder[i]);
    sub.textContent='期待度上昇中...';
    await sleep(i===finalIdx?800:400);
    if(i<finalIdx&&Math.random()<0.3){setPackColor(colorOrder[Math.max(0,i-1)]);await sleep(200);}
  }
}

async function puchunSequence(finalColor,topTier,label,sub){
  label.textContent='プチュン...';sub.textContent='💓';
  setPackColor('white');await sleep(400);
  const pw=document.getElementById('puchun-wrap');
  pw.innerHTML='<div class="puchun-heart">💓</div>';
  await sleep(300);pw.innerHTML='';
  const dw=document.getElementById('dokkun-wrap');
  dw.style.display='flex';
  const cnt=['sr','sar'].includes(topTier)?2:1;
  label.textContent='ドックン！';
  for(let i=0;i<cnt;i++){
    if(gachaSkipped)break;
    dw.innerHTML=`<div class="dokkun-char">💗</div><div class="dokkun-text">ドックン${i+1}回目！</div>`;
    await sleep(600);
  }
  dw.style.display='none';
  setPackColor(finalColor);
  label.textContent=getColorLabel(finalColor);
  sub.textContent=cnt>=2?'🎊 大チャンス！':'期待度アップ！';
  await sleep(800);
}

async function rewindSequence(finalColor,topTier,label,sub){
  setPackColor('white');label.textContent='残念...';sub.textContent='ハズレ？';
  await sleep(600);if(gachaSkipped)return;
  const ro=document.getElementById('rewind-overlay');
  ro.style.display='flex';label.textContent='REWIND!!';sub.textContent='逆転演出！';
  await sleep(900);ro.style.display='none';
  setPackColor(finalColor);
  label.textContent='🔥 復活！'+getColorLabel(finalColor);
  sub.textContent='逆転大当たり！！';await sleep(800);
}

function setPackColor(color){
  document.getElementById('gacha-pack').className='gacha-pack col-'+color;
  document.querySelectorAll('.ci-dot').forEach(d=>d.classList.toggle('active',d.dataset.col===color));
}
function getColorLabel(color){
  return{white:'白…',blue:'青！期待！',green:'緑！チャンス！',red:'赤！激アツ！',gold:'金！大当たり！',rainbow:'虹！！！最高演出！！！'}[color]||'';
}
function showGachaResult(results,pack,topTier){
  document.getElementById('gacha-screen').classList.remove('show');
  document.getElementById('gacha-video-wrap').style.display='none';
  document.getElementById('gacha-pack').style.display='flex';
  if(topTier==='sar')showJackpot(results[0].prize.name,()=>showResultCards(results,pack));
  else showResultCards(results,pack);
}
async function skipGacha(){
  gachaSkipped=true;
  const vid=document.getElementById('gacha-video');
  vid.pause();
  document.getElementById('gacha-screen').classList.remove('show');
  document.getElementById('gacha-video-wrap').style.display='none';
  document.getElementById('gacha-pack').style.display='flex';
  if(gachaResults.length){
    const topTier=gachaResults.reduce((best,r)=>{
      const order={c:0,r:1,rr:2,sr:3,sar:4};
      return(order[r.prize.tier]||0)>(order[best]||0)?r.prize.tier:best;
    },'c');
    showGachaResult(gachaResults,state.activePack,topTier);
  }
}

function generateSeed(){return Math.random().toString(36).slice(2).repeat(3)}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function generateCode(){return Math.random().toString(36).slice(2,8).toUpperCase()}

function pickPrize(prizes,rng){
  const packId=state.activePack?.id||'';
  const tenjoCount=state.tenjoCount[packId]||0;
  const tenjoLimit=state.activePack?.tenjo_limit||0;
  if(tenjoLimit>0&&tenjoCount>=tenjoLimit-1){
    const sarPrizes=prizes.filter(p=>p.tier==='sar');
    if(sarPrizes.length)return sarPrizes[0];
  }
  const total=prizes.reduce((s,p)=>s+p.weight,0);
  let t=rng*total;
  for(const p of prizes){t-=p.weight;if(t<=0)return p;}
  return prizes[prizes.length-1];
}

function closeDrawModal(){document.getElementById('draw-modal').classList.remove('show')}
function pickDrawCount(el,n){
  document.querySelectorAll('.count-opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');state.drawCount=n;
}

async function executeDraw(){
  const pack=state.activePack;if(!pack)return;
  if(!state.user){
    closeDrawModal();
    document.getElementById('auth-modal').classList.add('show');
    showToast('ガチャを引くにはログインが必要です');return;
  }
  const cost=pack.price*state.drawCount;
  if(state.coin<cost){
    showToast('🪙 コインが不足しています');
    closeDrawModal();openPurchase();return;
  }
  state.coin-=cost;
  updateHeaderPts();closeDrawModal();
  const prizes=pack.prizes||[];
  const results=Array.from({length:state.drawCount},()=>({prize:pickPrize(prizes,Math.random())}));
  await saveTenjoCount(pack.id,state.drawCount);
  await saveDrawSession(pack.id,results,cost);
  state.dp+=Math.floor(cost*0.05);
  state.totalSpent+=cost;
  const{rank}=getRankInfo(state.totalSpent);
  state.rank=rank.name;
  await db.from('users').update({rank:state.rank,dp_points:state.dp,total_spent:state.totalSpent,coin_points:state.coin}).eq('id',state.user.id);
  state.sessions.unshift({
    id:generateSeed().slice(0,8),
    packId:pack.id,packName:pack.name,
    results,cost,date:new Date().toLocaleString('ja-JP'),shipped:false,
  });
  startGachaAnimation(results,pack);
}

async function saveDrawSession(packId,results,totalCost){
  const{data:session}=await db.from('draw_sessions').insert({
    user_id:state.user.id,pack_id:packId,
    draw_count:results.length,total_cost:totalCost,
    currency:'coin',server_seed:generateSeed(),
  }).select().single();
  if(!session)return;
  const resultRows=results.map(r=>({
    session_id:session.id,user_id:state.user.id,
    pack_id:packId,prize_id:r.prize.id||r.prize.name,
    prize_name:r.prize.name,prize_tier:r.prize.tier,
    result_hash:generateSeed(),is_converted:false,
  }));
  await db.from('draw_results').insert(resultRows).catch(()=>{});
  await db.from('transactions').insert({
    user_id:state.user.id,type:'draw',amount:-totalCost,
    currency:'coin',description:`${state.activePack?.name} × ${results.length}回`,
  }).catch(()=>{});
}

/* ══ ポイント還元 DB連動 ══ */
async function convertToPoints(sessionIdx,resultIdx){
  const session=state.sessions[sessionIdx];if(!session||session.shipped)return;
  const result=session.results[resultIdx];
  if(result.converted){showToast('すでに還元済みです');return;}
  const tierValue={sar:5000,sr:1000,rr:300,r:100,c:50};
  const points=tierValue[result.prize.tier]||50;
  result.converted=true;state.coin+=points;updateHeaderPts();
  if(state.user){
    await db.from('users').update({coin_points:state.coin}).eq('id',state.user.id);
    if(result.dbId){
      await db.from('draw_results').update({is_converted:true}).eq('id',result.dbId);
    }
    await db.from('transactions').insert({
      user_id:state.user.id,type:'convert',amount:points,
      currency:'coin',description:`${result.prize.name} をポイント還元`,
    }).catch(()=>{});
  }
  renderHistory();renderItemsPage();
  showToast(`💰 ${points}コインに還元しました！`,2500);
}

async function convertAllToPoints(sessionIdx){
  const session=state.sessions[sessionIdx];if(!session)return;
  const tierValue={sar:5000,sr:1000,rr:300,r:100,c:50};
  let total=0;
  const dbIds=[];
  session.results.forEach(r=>{
    if(!r.converted){
      r.converted=true;
      total+=tierValue[r.prize.tier]||50;
      if(r.dbId)dbIds.push(r.dbId);
    }
  });
  if(total===0){showToast('還元できるカードがありません');return;}
  state.coin+=total;updateHeaderPts();
  if(state.user){
    await db.from('users').update({coin_points:state.coin}).eq('id',state.user.id);
    if(dbIds.length){
      await db.from('draw_results').update({is_converted:true}).in('id',dbIds);
    }
  }
  renderHistory();renderItemsPage();
  showToast(`💰 ${total}コインに一括還元しました！`,2500);
}

async function submitShipping(){

        <div style="display:flex;flex-direction:column;gap:4px">
          <button class="convert-btn" onclick="convertToPoints(${item.sessionIdx},${item.resultIdx})">💰 還元</button>
          <button style="background:rgba(201,168,76,.1);color:var(--gold2);font-size:.72rem;font-weight:700;padding:4px 10px;border-radius:5px;border:1px solid var(--border2)" onclick="openShippingModal(${item.sessionIdx})">📦 発送</button>
        </div>
      </div>`).join('')}
    </div>`;
}

/* ══ 履歴 ══ */
function renderHistory(){
  const list=document.getElementById('history-list');
  if(!state.sessions.length){
    list.innerHTML=`<div style="text-align:center;padding:48px;color:var(--text3)"><div style="font-size:2rem;margin-bottom:10px">🕐</div><div style="font-weight:700;color:var(--text2)">当選履歴はありません</div></div>`;
    return;
  }
  list.innerHTML=state.sessions.map((s,si)=>`
    <div class="hist-card">
      <div class="hist-top"><span class="hist-pack">${s.packName}</span><span class="hist-time">${s.date}</span></div>
      <div class="hist-results">
        ${s.results.map((r,ri)=>`
          <span class="hist-chip hc-${r.prize.tier} ${r.converted?'hc-converted':''}" onclick="convertToPoints(${si},${ri})">
            ${r.prize.name}${r.converted?'（済）':''}
          </span>`).join('')}
      </div>
      <div class="hist-cost">消費: ${s.cost.toLocaleString()} コイン</div>
      <div class="hist-action-btns">
        ${!s.shipped?`
          <button class="hist-btn hist-btn-convert" onclick="convertAllToPoints(${si})">💰 一括還元</button>
          <button class="hist-btn hist-btn-ship" onclick="openShippingModal(${si})">📦 発送依頼</button>
        `:'<span style="font-size:.72rem;color:var(--text3)">📦 発送依頼済み</span>'}
      </div>
    </div>`).join('');
}

/* ══ マイページ ══ */
function renderMyPage(){
  const content=document.getElementById('mypage-content');
  if(!state.user){
    content.innerHTML=`
      <div style="text-align:center;padding:40px 0">
        <div style="font-size:3rem;margin-bottom:12px">🎴</div>
        <div style="font-size:1rem;font-weight:900;margin-bottom:6px;color:var(--text)">ログインして始めよう</div>
        <div style="font-size:.82rem;color:var(--text3);margin-bottom:20px">新規登録で500コイン無料！</div>
        <button onclick="document.getElementById('auth-modal').classList.add('show')"
          style="background:linear-gradient(135deg,var(--gold2),var(--gold),var(--gold-dark));color:#0a0a0a;padding:13px 40px;border-radius:12px;font-weight:900;font-size:.95rem;box-shadow:0 4px 16px rgba(201,168,76,.25)">
          ログイン / 無料登録
        </button>
      </div>`;
    return;
  }
  const{rank:currentRank,idx:rankIdx}=getRankInfo(state.totalSpent);
  const nextRank=RANKS[Math.min(rankIdx+1,RANKS.length-1)];
  const progress=state.totalSpent-currentRank.min;
  const needed=nextRank.min-currentRank.min;
  const pct=Math.min(100,Math.round((progress/needed)*100));
  const refCode=state.user.referral_code||'—';
  content.innerHTML=`
    <div class="mp-user-card">
      <div class="mp-avatar">👤</div>
      <div class="mp-username">${state.user.username}</div>
      <div class="mp-rank">🏅 ${state.rank}</div>
      <div class="mp-pts-row">
        <div class="mp-pt"><div class="mp-pt-label">🪙 コイン</div><div class="mp-pt-val">${state.coin.toLocaleString()}</div></div>
        <div class="mp-pt"><div class="mp-pt-label">🔷 DP</div><div class="mp-pt-val">${state.dp.toLocaleString()}</div></div>
      </div>
    </div>
    <div class="mp-rank-wrap">
      <div class="mp-rank-title">🏆 ランク進捗</div>
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;font-size:.75rem">
        <span style="font-weight:900;color:var(--gold2)">${currentRank.name}</span>
        <span style="color:var(--text3)">▶ ${nextRank.name}</span>
      </div>
      <div class="mp-rank-bar-wrap"><div class="mp-rank-fill" style="width:${pct}%"></div></div>
      <div class="mp-rank-labels"><span>${state.totalSpent.toLocaleString()} コイン使用</span><span>あと ${(nextRank.min-state.totalSpent).toLocaleString()} コイン</span></div>
    </div>
    <div class="referral-section">
      <div style="font-size:.88rem;font-weight:900;margin-bottom:4px;color:var(--text)">🔗 友達紹介コード</div>
      <div style="font-size:.75rem;color:var(--text3);margin-bottom:8px">友達が登録すると双方に300コインプレゼント！</div>
      <div class="ref-code-box">
        <div class="ref-code">${refCode}</div>
        <div style="font-size:.72rem;color:var(--text3);margin-top:4px">紹介成功で +300コイン</div>
      </div>
      <button class="ref-copy-btn" onclick="copyCode('${refCode}')">📋 コードをコピー</button>
    </div>
    <div class="mp-menu">
      <div class="mp-menu-item" onclick="openPurchase()"><span class="mp-menu-icon">🪙</span>コインをチャージ<span class="mp-menu-arrow">›</span></div>
      <div class="mp-menu-item" onclick="showPage('items',document.querySelector('[data-page=items]'))"><span class="mp-menu-icon">📦</span>獲得商品・発送依頼<span class="mp-menu-arrow">›</span></div>
      <div class="mp-menu-item" onclick="doForgotPassword()"><span class="mp-menu-icon">🔑</span>パスワードリセット<span class="mp-menu-arrow">›</span></div>
      <div class="mp-menu-item" onclick="doLogout()"><span class="mp-menu-icon">🚪</span>ログアウト<span class="mp-menu-arrow">›</span></div>
    </div>`;
}

function copyCode(code){
  navigator.clipboard.writeText(code).catch(()=>{});
  showToast('📋 コードをコピーしました！');
}



/* ══ ナビ ══ */
function showPage(name,el){
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  if(el)el.classList.add('active');
  else{const btn=document.querySelector(`[data-page="${name}"]`);if(btn)btn.classList.add('active');}
  document.getElementById(`page-${name}`)?.classList.add('active');
  if(name==='mypage')renderMyPage();
  if(name==='notices')renderNotices();
  if(name==='history')renderHistory();
  if(name==='items')renderItemsPage();
}
document.querySelectorAll('.bnav-btn').forEach(btn=>{
  btn.addEventListener('click',()=>showPage(btn.dataset.page,btn));
});
document.querySelectorAll('.cat-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');state.currentCat=tab.dataset.cat;renderPacks();
  });
});
document.querySelectorAll('.sort-chip').forEach(chip=>{
  chip.addEventListener('click',()=>{
    document.querySelectorAll('.sort-chip').forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');state.currentSort=chip.dataset.sort;renderPacks();
  });
});
document.querySelectorAll('.modal-overlay').forEach(overlay=>{
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.classList.remove('show');});
});

/* ══ UTILS ══ */
function showToast(msg,dur=2200){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}
function updateHeaderPts(){
  document.getElementById('h-coin').textContent=state.coin.toLocaleString();
}
function switchAuth(mode){
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(i===0)===(mode==='login')));
  document.getElementById('auth-form-login').style.display=mode==='login'?'block':'none';
  document.getElementById('auth-form-register').style.display=mode==='register'?'block':'none';
}
function closeAllModals(){document.querySelectorAll('.modal-overlay').forEach(m=>m.classList.remove('show'));}
function closeModal(id){document.getElementById(id).classList.remove('show');}

/* ══ INIT ══ */
(async()=>{
  // 決済完了チェック
  const params=new URLSearchParams(location.search);
  if(params.get('payment')==='success'){
    history.replaceState({},'','/');
    showToast('🎉 チャージ完了！コインが付与されました！',3500);
  }
  if(params.get('payment')==='cancel'){
    history.replaceState({},'','/');
    showToast('決済がキャンセルされました');
  }
  await checkSession();
  if(state.user){
    await loadHistoryFromDB();
    await loadTenjoFromDB();
  }
  await Promise.all([
    loadAndRenderPacks(),
    loadBanners(),
    loadNotices(),
    loadVideos(),
  ]);
})();
</script>
