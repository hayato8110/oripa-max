<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>オリパMAX | ネットオリパ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{background:#f2f2f2;color:#1a1a1a;font-family:'Noto Sans JP',sans-serif;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:68px}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input{font-family:inherit;outline:none}
::-webkit-scrollbar{display:none}
:root{
  --gold:#e8a800;--gold2:#c88000;--gold-light:#ffd740;
  --red:#e82020;--red2:#c00000;
  --green:#00b050;--blue:#0066cc;
  --bg:#f2f2f2;--card:#fff;
  --border:#e8e8e8;
  --text:#1a1a1a;--text2:#555;--text3:#999;
}
#toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:10px 22px;border-radius:999px;font-size:.82rem;font-weight:700;z-index:9999;opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.3)}
#toast.show{opacity:1}
.header{position:sticky;top:0;z-index:100;background:#fff;height:56px;display:flex;align-items:center;padding:0 12px;gap:8px;border-bottom:1px solid var(--border);box-shadow:0 1px 6px rgba(0,0,0,.06)}
.h-logo{font-size:1.45rem;font-weight:900;color:var(--gold);flex:1;display:flex;align-items:center;gap:4px}
.h-logo .logo-mark{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;font-size:.65rem;font-weight:900;padding:2px 6px;border-radius:4px}
.h-currencies{display:flex;align-items:center;gap:6px}
.h-cur{display:flex;align-items:center;gap:4px;background:#f5f5f5;border-radius:999px;padding:4px 10px;cursor:pointer;border:1px solid var(--border)}
.h-cur .cur-val{font-size:.85rem;font-weight:900;color:var(--text)}
.h-cur .cur-label{background:linear-gradient(135deg,#cc0000,#ff2222);color:#fff;font-size:.5rem;font-weight:900;padding:1px 4px;border-radius:3px}
.h-add-btn{background:linear-gradient(135deg,var(--red),var(--red2));color:#fff;width:22px;height:22px;border-radius:50%;font-size:.9rem;font-weight:900;display:flex;align-items:center;justify-content:center}
.h-notif{position:relative;background:none;padding:6px;color:var(--text3);font-size:1.25rem}
.h-notif-dot{position:absolute;top:4px;right:4px;width:7px;height:7px;background:var(--red);border-radius:50%;border:1.5px solid #fff}
.cat-bar{position:sticky;top:56px;z-index:99;background:#fff;display:flex;border-bottom:2px solid var(--border);overflow-x:auto;height:44px}
.cat-tab{flex-shrink:0;padding:0 16px;height:100%;display:flex;align-items:center;font-size:.88rem;font-weight:700;color:var(--text3);background:none;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:.15s}
.cat-tab.active{color:var(--gold);border-color:var(--gold)}
.alert-bar{background:linear-gradient(90deg,#dd1100,#ff4400,#ff6600);color:#fff;padding:7px 12px;font-size:.8rem;font-weight:700;display:flex;align-items:center;gap:5px}
.sort-bar{background:#fff;padding:8px 10px;display:flex;gap:6px;overflow-x:auto;border-bottom:1px solid var(--border)}
.sort-chip{flex-shrink:0;padding:4px 12px;border-radius:999px;font-size:.75rem;font-weight:700;background:#f5f5f5;color:var(--text2);border:1px solid var(--border);transition:.15s}
.sort-chip.active{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;border-color:transparent}
.wins-bar{background:#fff8e0;border-bottom:1px solid #f0e0a0;padding:6px 0;overflow:hidden}
.wins-track{display:flex;animation:winscroll 22s linear infinite;white-space:nowrap}
.wins-item{display:inline-flex;align-items:center;gap:6px;padding:0 20px;font-size:.75rem;font-weight:700;color:#665500}
.wi-badge{font-size:.6rem;font-weight:900;padding:1px 5px;border-radius:2px}
.wi-sar{background:#e8a800;color:#fff}.wi-sr{background:#8800cc;color:#fff}.wi-rr{background:#0066cc;color:#fff}
@keyframes winscroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.packs-list{padding:8px}
.pack-card{background:#fff;border-radius:14px;margin-bottom:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);border:1px solid var(--border);cursor:pointer;transition:transform .12s}
.pack-card:active{transform:scale(.99)}
.pc-banner{width:100%;min-height:210px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end}
.pcb-bg{position:absolute;inset:0;z-index:0}
.pcb-bg::after{content:'';position:absolute;bottom:0;left:0;right:0;height:60%;background:linear-gradient(transparent,rgba(0,0,0,.55))}
.pcb-shine{position:absolute;inset:0;z-index:1;background:linear-gradient(135deg,rgba(255,255,255,.08) 0%,transparent 50%,rgba(255,255,255,.04) 100%)}
.pcb-char{position:absolute;right:12px;bottom:48px;z-index:3;font-size:6rem;line-height:1;filter:drop-shadow(2px 6px 14px rgba(0,0,0,.5));animation:flt 3.5s ease-in-out infinite}
@keyframes flt{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-8px) rotate(2deg)}}
.pcb-content{position:relative;z-index:4;padding:12px 14px 10px;display:flex;flex-direction:column;gap:5px}
.pcb-ribbon{display:inline-flex;align-items:center;font-size:.65rem;font-weight:900;letter-spacing:.07em;padding:3px 16px 3px 8px;border-radius:3px;align-self:flex-start;clip-path:polygon(0 0,calc(100% - 5px) 0,100% 50%,calc(100% - 5px) 100%,0 100%)}
.ribbon-hot{background:linear-gradient(90deg,#cc0000,#ff3300);color:#ffe}
.ribbon-new{background:linear-gradient(90deg,#0055cc,#0088ff);color:#fff}
.ribbon-limit{background:linear-gradient(90deg,#660099,#aa00ee);color:#fff}
.pcb-top-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.pcb-name{font-size:1.5rem;font-weight:900;color:#fff;line-height:1.15;text-shadow:1px 2px 6px rgba(0,0,0,.5)}
.pcb-series{font-size:.72rem;font-weight:700;color:rgba(255,255,240,.75);margin-top:2px}
.pcb-rate{display:flex;flex-direction:column;align-items:center;background:rgba(0,0,0,.35);border:1.5px solid rgba(255,220,80,.5);border-radius:8px;padding:4px 8px;flex-shrink:0;backdrop-filter:blur(4px);min-width:60px}
.pcb-rate-label{font-size:.52rem;color:rgba(255,220,80,.8);font-weight:700}
.pcb-rate-num{font-size:1.55rem;font-weight:900;line-height:1;color:#ffe566}
.pcb-rate-unit{font-size:.58rem;color:rgba(255,210,80,.8);font-weight:700}
.pcb-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:2px}
.pcb-chip{display:flex;align-items:center;gap:4px;background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:3px 9px}
.pcb-chip span{font-size:.67rem;font-weight:700;color:rgba(255,255,220,.9)}
.pcb-tiers{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
.tier-pill{font-size:.6rem;font-weight:900;padding:2px 7px;border-radius:3px}
.tp-s{background:rgba(255,200,0,.2);color:#ffe08a;border:1px solid rgba(255,200,0,.35)}
.tp-a{background:rgba(180,80,255,.2);color:#dda8ff;border:1px solid rgba(180,80,255,.35)}
.tp-b{background:rgba(0,170,255,.15);color:#88ddff;border:1px solid rgba(0,170,255,.3)}
.tp-c{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.15)}
.pc-bottom{padding:10px 12px 12px}
.pc-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.pc-price{font-size:1.2rem;font-weight:900;color:var(--text)}
.pc-price-unit{font-size:.7rem;color:var(--text3);font-weight:700}
.pc-remain{font-size:.78rem;font-weight:700;color:var(--text2)}
.pc-remain b{color:var(--red)}
.progress-bg{background:#eaeaea;border-radius:999px;height:7px;overflow:hidden;margin-bottom:10px;position:relative}
.progress-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#00bb44,#00ee66);position:relative;overflow:hidden;transition:.5s}
.progress-fill.warn{background:linear-gradient(90deg,#ee8800,#ffaa00)}
.progress-fill.danger{background:linear-gradient(90deg,#dd0000,#ff3300)}
.progress-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);animation:shimmer 1.8s infinite}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(200%)}}
.pc-btns{display:flex;gap:7px}
.pc-btn-1{flex:1;padding:12px 6px;border-radius:10px;font-size:.95rem;font-weight:900;background:linear-gradient(160deg,#f5c800,#e0a000);color:#fff;box-shadow:0 3px 10px rgba(200,140,0,.3),inset 0 1px 0 rgba(255,255,255,.25);text-shadow:0 1px 2px rgba(0,0,0,.2);position:relative;overflow:hidden;transition:.1s}
.pc-btn-1::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.15) 0%,transparent 55%)}
.pc-btn-1:active{transform:scale(.97)}
.pc-btn-5{flex:1;padding:12px 6px;border-radius:10px;font-size:.95rem;font-weight:900;background:linear-gradient(160deg,#ff3333,#cc0000);color:#fff;box-shadow:0 3px 10px rgba(200,0,0,.3),inset 0 1px 0 rgba(255,255,255,.2);text-shadow:0 1px 2px rgba(0,0,0,.2);position:relative;overflow:hidden;transition:.1s}
.pc-btn-5::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.12) 0%,transparent 55%)}
.pc-btn-5:active{transform:scale(.97)}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;flex-direction:column;gap:16px}
.spinner{width:36px;height:36px;border-radius:50%;border:3px solid rgba(232,168,0,.2);border-top-color:var(--gold);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.show{opacity:1;pointer-events:all}
.bottom-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:0 0 28px;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:90vh;overflow-y:auto}
.modal-overlay.show .bottom-sheet{transform:translateY(0)}
.bs-drag{width:40px;height:4px;background:#ddd;border-radius:2px;margin:14px auto 0}
.bs-hero{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.bs-hero-icon{font-size:2.4rem}
.bs-pack-name{font-size:1.05rem;font-weight:900}
.bs-pack-series{font-size:.74rem;color:var(--text3);margin-top:2px}
.bs-section-label{padding:12px 16px 6px;font-size:.68rem;font-weight:900;letter-spacing:.1em;color:var(--text3);text-transform:uppercase}
.bs-prizes{display:flex;flex-wrap:wrap;gap:6px;padding:0 16px 12px;border-bottom:1px solid var(--border)}
.bs-prize{background:#f8f8f8;border:1px solid #ebebeb;border-radius:7px;padding:5px 10px;display:flex;align-items:center;gap:6px}
.bsp-tier{font-size:.58rem;font-weight:900;padding:1px 5px;border-radius:2px}
.bsp-s{background:#fff3cc;color:#9a6000;border:1px solid #e8c040}
.bsp-a{background:#f0e8ff;color:#660099;border:1px solid #c080ff}
.bsp-b{background:#e0f0ff;color:#004488;border:1px solid #80b8ff}
.bsp-c{background:#f0f0f0;color:#888;border:1px solid #ddd}
.bsp-name{font-size:.76rem;font-weight:700}
.bsp-cnt{font-size:.65rem;color:var(--text3)}
.count-opts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;padding:8px 16px 12px;border-bottom:1px solid var(--border)}
.count-opt{background:#f8f8f8;border:1.5px solid #e0e0e0;border-radius:10px;padding:10px 5px;text-align:center;cursor:pointer;transition:.15s}
.count-opt.sel{border-color:var(--gold);background:#fffbee}
.co-num{font-size:1.6rem;font-weight:900;color:var(--gold);line-height:1}
.co-price{font-size:.7rem;color:var(--text2);margin-top:2px;font-weight:700}
.co-bonus{font-size:.58rem;color:var(--green);font-weight:800;margin-top:1px}
.bs-draw-btn{margin:10px 16px 0;width:calc(100% - 32px);background:linear-gradient(160deg,#ff3333,#cc0000);color:#fff;font-size:1rem;font-weight:900;padding:14px;border-radius:12px;box-shadow:0 4px 16px rgba(200,0,0,.25);letter-spacing:.02em;transition:.1s}
.bs-draw-btn:active{transform:scale(.98)}
.bs-cancel-btn{width:100%;padding:12px;margin-top:6px;background:none;color:var(--text3);font-size:.85rem;font-weight:700}
.auth-sheet{max-height:85vh}
.auth-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:0}
.auth-tab{flex:1;padding:12px;text-align:center;font-size:.9rem;font-weight:700;color:var(--text3);background:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s}
.auth-tab.active{color:var(--gold);border-color:var(--gold)}
.auth-form{padding:16px}
.auth-label{font-size:.75rem;font-weight:700;color:var(--text2);margin-bottom:4px;display:block}
.auth-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:.9rem;color:var(--text);transition:.2s;margin-bottom:12px}
.auth-input:focus{border-color:var(--gold)}
.auth-submit{width:100%;padding:13px;border-radius:10px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;font-size:.95rem;font-weight:900;margin-top:4px;transition:.1s}
.auth-submit:active{transform:scale(.98)}
.plan-item{display:flex;align-items:center;justify-content:space-between;background:#f8f8f8;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;margin-bottom:8px;cursor:pointer;transition:.15s}
.plan-item.popular{border-color:var(--gold);background:#fffce8}
.plan-jp{font-size:1.1rem;font-weight:900}
.plan-bonus{font-size:.7rem;color:var(--green);font-weight:700;margin-top:1px}
.plan-badge{background:var(--red);color:#fff;font-size:.55rem;font-weight:900;padding:1px 5px;border-radius:2px;margin-left:6px}
.plan-price{font-size:.95rem;font-weight:900;color:var(--text);text-align:right}

/* ═══════════════════════════════════════
   DOPA風ガチャ演出
═══════════════════════════════════════ */
.gacha-screen{
  position:fixed;inset:0;z-index:500;
  background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:.3s;
  overflow:hidden;
}
.gacha-screen.show{opacity:1;pointer-events:all}

/* 背景パーティクル */
.gacha-bg{position:absolute;inset:0;z-index:0}
.gacha-bg-circle{
  position:absolute;border-radius:50%;
  animation:bg-pulse 2s ease-in-out infinite;
}
@keyframes bg-pulse{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(1.1);opacity:.6}}

/* メイン演出ステージ */
.gacha-stage{
  position:relative;z-index:10;
  width:280px;height:280px;
  display:flex;align-items:center;justify-content:center;
}

/* パック（メインオブジェクト） */
.gacha-pack{
  width:160px;height:200px;
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:5rem;
  position:relative;
  transition:all .3s;
  box-shadow:0 0 40px currentColor;
}
.gacha-pack.col-white{background:linear-gradient(145deg,#e0e0e0,#fff);color:#ccc;box-shadow:0 0 20px rgba(200,200,200,.3)}
.gacha-pack.col-blue{background:linear-gradient(145deg,#0044aa,#0066ff);color:#4488ff;box-shadow:0 0 30px rgba(68,136,255,.5)}
.gacha-pack.col-green{background:linear-gradient(145deg,#005500,#00aa00);color:#00cc44;box-shadow:0 0 30px rgba(0,200,60,.5)}
.gacha-pack.col-red{background:linear-gradient(145deg,#880000,#cc0000);color:#ff4444;box-shadow:0 0 40px rgba(255,60,60,.6)}
.gacha-pack.col-gold{background:linear-gradient(145deg,#664400,#cc8800);color:#ffcc00;box-shadow:0 0 50px rgba(255,200,0,.7)}
.gacha-pack.col-rainbow{
  background:linear-gradient(145deg,#330066,#660099,#0044cc,#006600,#cc8800,#cc0000);
  color:#fff;
  box-shadow:0 0 60px rgba(255,255,255,.5);
  animation:rainbow-glow 1s infinite;
}
@keyframes rainbow-glow{
  0%{box-shadow:0 0 60px rgba(255,0,0,.7)}
  25%{box-shadow:0 0 60px rgba(255,200,0,.7)}
  50%{box-shadow:0 0 60px rgba(0,255,100,.7)}
  75%{box-shadow:0 0 60px rgba(0,100,255,.7)}
  100%{box-shadow:0 0 60px rgba(255,0,255,.7)}
}

/* プチュン演出 */
.puchun-wrap{
  position:absolute;inset:0;z-index:20;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
.puchun-heart{
  font-size:4rem;
  animation:puchun-anim .6s ease-out forwards;
  opacity:0;
}
@keyframes puchun-anim{
  0%{transform:scale(0) translateY(0);opacity:1}
  50%{transform:scale(1.4) translateY(-20px);opacity:1}
  100%{transform:scale(1) translateY(-60px);opacity:0}
}

/* ドックン演出 */
.dokkun-wrap{
  position:absolute;inset:0;z-index:25;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;pointer-events:none;
}
.dokkun-char{font-size:5rem;animation:dokkun .4s ease-out}
@keyframes dokkun{0%{transform:scale(1)}30%{transform:scale(1.3)}60%{transform:scale(.9)}100%{transform:scale(1)}}
.dokkun-text{
  font-size:1.4rem;font-weight:900;color:#fff;
  text-shadow:0 0 20px rgba(255,200,0,.8);
  animation:dokkun-text-in .3s ease-out;
}
@keyframes dokkun-text-in{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}

/* 巻き戻し演出 */
.rewind-overlay{
  position:absolute;inset:0;z-index:30;
  background:rgba(0,0,0,.9);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:12px;
}
.rewind-text{
  font-size:1.2rem;font-weight:900;color:#fff;
  letter-spacing:.15em;
  animation:glitch .1s infinite;
}
@keyframes glitch{
  0%{transform:translateX(0);color:#fff}
  25%{transform:translateX(-3px);color:#ff0044}
  50%{transform:translateX(3px);color:#00ffaa}
  75%{transform:translateX(-2px);color:#ffcc00}
  100%{transform:translateX(0);color:#fff}
}
.rewind-bar{
  width:200px;height:4px;background:#333;border-radius:999px;overflow:hidden;
}
.rewind-fill{
  height:100%;background:linear-gradient(90deg,#ff0044,#ffcc00,#00ffaa);
  animation:rewind-progress .8s ease-out forwards;
}
@keyframes rewind-progress{from{width:100%}to{width:0%}}

/* 役物演出（剣落下） */
.yakumono{
  position:absolute;top:-100px;
  font-size:4rem;z-index:35;
  animation:yakumono-fall .5s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes yakumono-fall{
  from{top:-100px;transform:rotate(0deg)}
  to{top:50px;transform:rotate(360deg)}
}

/* 演出テキスト */
.gacha-label{
  position:relative;z-index:10;
  text-align:center;padding:0 16px;
}
.gacha-label-main{
  font-size:1.1rem;font-weight:900;color:rgba(255,255,255,.5);
  letter-spacing:.1em;margin-bottom:4px;
}
.gacha-label-sub{
  font-size:.8rem;color:rgba(255,255,255,.3);
  letter-spacing:.05em;
}

/* 演出カラーインジケーター */
.color-indicator{
  display:flex;gap:6px;position:relative;z-index:10;
}
.ci-dot{
  width:10px;height:10px;border-radius:50%;
  opacity:.3;transition:.3s;
}
.ci-dot.active{opacity:1;transform:scale(1.3)}
.ci-white{background:#ddd}
.ci-blue{background:#4488ff}
.ci-green{background:#00cc44}
.ci-red{background:#ff4444}
.ci-gold{background:#ffcc00}
.ci-rainbow{background:linear-gradient(90deg,#ff0000,#ffcc00,#00ff88,#0088ff,#ff00ff)}

/* 結果画面 */
.result-screen{
  position:fixed;inset:0;z-index:600;
  background:rgba(0,0,0,.95);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;
  opacity:0;pointer-events:none;transition:.3s;
}
.result-screen.show{opacity:1;pointer-events:all}
.result-title{font-size:1rem;font-weight:900;color:rgba(255,255,255,.4);letter-spacing:.15em}
.result-cards{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:440px;padding:0 12px}
.rc{width:100px;height:140px;perspective:500px;cursor:pointer;flex-shrink:0}
.rc-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .65s cubic-bezier(.4,0,.2,1);border-radius:9px}
.rc.done .rc-inner{transform:rotateY(180deg)}
.rc-back,.rc-front{position:absolute;inset:0;backface-visibility:hidden;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.rc-back{background:linear-gradient(145deg,#14142a,#0a0a1e);border:1.5px solid rgba(232,168,0,.3);font-size:2.6rem;box-shadow:0 4px 18px rgba(0,0,0,.5)}
.rc-back::before{content:'';position:absolute;inset:5px;border:1px solid rgba(232,168,0,.1);border-radius:6px}
.rc-front{border-width:2px;border-style:solid;transform:rotateY(180deg)}
.rc-emoji{font-size:1.8rem;z-index:1}
.rc-name{font-size:.52rem;font-weight:900;text-align:center;padding:0 4px;z-index:1;line-height:1.3}
.rc-tier{font-size:.48rem;z-index:1;opacity:.7}
.rf-sar{background:linear-gradient(145deg,#1c1600,#2e2400);border-color:#e8a800;box-shadow:0 0 28px rgba(232,168,0,.4)}
.rf-sar .rc-emoji,.rf-sar .rc-name{color:#e8a800}
.rf-sr{background:linear-gradient(145deg,#0e0020,#1a0035);border-color:#b066ff;box-shadow:0 0 22px rgba(176,102,255,.35)}
.rf-sr .rc-emoji,.rf-sr .rc-name{color:#cc88ff}
.rf-rr{background:linear-gradient(145deg,#001626,#002040);border-color:#0088cc}
.rf-rr .rc-emoji,.rf-rr .rc-name{color:#44ccee}
.rf-r{background:linear-gradient(145deg,#0a1020,#101830);border-color:#446699}
.rf-r .rc-emoji,.rf-r .rc-name{color:#8899cc}
.rf-c{background:linear-gradient(145deg,#101012,#181818);border-color:#383840}
.rf-c .rc-emoji,.rf-c .rc-name{color:#666680}
.result-done-btn{background:linear-gradient(160deg,#f5c800,#e0a000);color:#fff;font-size:.95rem;font-weight:900;padding:13px 48px;border-radius:12px;box-shadow:0 4px 16px rgba(200,140,0,.35);display:none}
.result-done-btn.show{display:block;animation:pop .3s ease-out}
@keyframes pop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.result-hint{font-size:.72rem;color:rgba(255,255,255,.25);font-weight:700}

@keyframes jackpot-shine{

}

<script>
/* ══════════════════════════════════════
   SUPABASE
══════════════════════════════════════ */
async function fetchPacks(){
  const{data,error}=await db.from('packs').select('*, prizes(*)').eq('is_active',true).order('sort_order');
  if(error){console.error(error);return[];}
  return data||[];
}
async function fetchUserProfile(userId){
  const{data,error}=await db.from('users').select('*').eq('id',userId).single();
  if(error)return null;
  return data;
}
async function saveDrawSession(packId,results,totalCost,currency){
  const serverSeed=generateSeed();
  const{data:session,error:sessionError}=await db.from('draw_sessions').insert({
    user_id:state.user.id,pack_id:packId,draw_count:results.length,
    total_cost:totalCost,currency,server_seed:serverSeed,
  }).select().single();
  if(sessionError){console.error(sessionError);return null;}
  const resultRows=results.map(r=>({
    session_id:session.id,user_id:state.user.id,
    pack_id:packId,prize_id:r.prize.id,result_hash:generateSeed(),
  }));
  await db.from('draw_results').insert(resultRows);
  const updateField=currency==='coin'?'coin_points':'jp_points';
  await db.from('users').update({
    [updateField]:state[currency==='coin'?'coin':'jp']-totalCost,
    dp_points:state.dp+Math.floor(totalCost*0.05),
    total_spent:state.totalSpent+totalCost,
  }).eq('id',state.user.id);
  await db.from('transactions').insert({
    user_id:state.user.id,type:'draw',amount:-totalCost,currency,
    description:`${state.activePack.name} × ${results.length}回`,
  });
  return session;
}
async function checkSession(){
  const{data:{session}}=await db.auth.getSession();
  if(session){state.session=session;await loadUserProfile(session.user.id);}
}
async function loadUserProfile(userId){
  const profile=await fetchUserProfile(userId);
  if(!profile)return;
  state.user=profile;state.jp=profile.jp_points;state.coin=profile.coin_points;
  state.dp=profile.dp_points;state.rank=profile.rank;state.totalSpent=profile.total_spent;
  updateHeaderPts();
}
async function doLogin(){
  const email=document.getElementById('login-email').value;
  const pass=document.getElementById('login-pass').value;
  if(!email||!pass){showToast('⚠️ 入力してください');return;}
  showToast('ログイン中...');
  const{data,error}=await db.auth.signInWithPassword({email,password:pass});
  if(error){showToast('⚠️ '+error.message);return;}
  state.session=data.session;await loadUserProfile(data.user.id);
  closeAllModals();showToast('✅ ログインしました！');
}
async function doRegister(){
  const name=document.getElementById('reg-name').value;
  const email=document.getElementById('reg-email').value;
  const pass=document.getElementById('reg-pass').value;
  const birth=document.getElementById('reg-birth').value;
  if(!name||!email||!pass||!birth){showToast('⚠️ 全項目を入力してください');return;}
  const age=Math.floor((Date.now()-new Date(birth))/(365.25*24*3600*1000));
  if(age<18){showToast('⚠️ 18歳未満は利用できません');return;}
  showToast('登録中...');
  const{data,error}=await db.auth.signUp({email,password:pass});
  if(error){showToast('⚠️ '+error.message);return;}
  await db.from('users').insert({
    id:data.user.id,email,username:name,
    password_hash:'managed_by_supabase_auth',coin_points:500,birth_date:birth,
  });
  state.session=data.session;await loadUserProfile(data.user.id);
  closeAllModals();showToast('🎉 登録完了！500コインプレゼント！',3000);
}
async function doLogout(){
  await db.auth.signOut();state.user=null;state.jp=0;state.coin=0;
  updateHeaderPts();renderMyPage();showToast('ログアウトしました');
}

/* ══════════════════════════════════════
   DOPA風ガチャ演出エンジン
══════════════════════════════════════ */
const COLORS=['white','blue','green','red','gold','rainbow'];
const COLOR_WEIGHTS={c:60,r:25,rr:10,sr:4,sar:1};
const TIER_TO_COLOR={c:'white',r:'blue',rr:'green',sr:'red',sar:'gold'};

let gachaResults=[];
let gachaSkipped=false;

function getTierColor(tier){
  // SARの場合は虹になることも
  if(tier==='sar')return Math.random()<0.3?'rainbow':'gold';
  return TIER_TO_COLOR[tier]||'white';
}

function startGachaAnimation(results,pack){
  gachaResults=results;
  gachaSkipped=false;
  const topTier=results.reduce((best,r)=>{
    const order={c:0,r:1,rr:2,sr:3,sar:4};
    return(order[r.prize.tier]||0)>(order[best]||0)?r.prize.tier:best;
  },'c');
  const finalColor=getTierColor(topTier);
  document.getElementById('gacha-screen').classList.add('show');
  runColorSequence(finalColor,topTier,results,pack);
}

async function runColorSequence(finalColor,topTier,results,pack){
  const pack_el=document.getElementById('gacha-pack');
  const label=document.getElementById('gacha-label-main');
  const sub=document.getElementById('gacha-label-sub');
  pack_el.textContent=state.activePack?.emoji||'🎴';
  // 初期色（白）
  setPackColor('white');
  label.textContent='抽選中...';
  sub.textContent='運命の瞬間';
  await sleep(600);
  // 演出タイプをランダム選択
  const演出type=Math.random();
  if(演出type<0.3){
    // プチュン演出
    await puchunSequence(finalColor,topTier,pack_el,label,sub);
  } else if(演出type<0.5&&['sr','sar'].includes(topTier)){
    // 巻き戻し演出（レア限定）
    await rewindSequence(finalColor,topTier,pack_el,label,sub);
  } else {
    // 通常カラー変化演出
    await normalSequence(finalColor,topTier,pack_el,label,sub);
  }
  // 演出終了→結果へ
  if(!gachaSkipped){
    await sleep(500);
    showGachaResult(results,pack,topTier);
  }
}

async function normalSequence(finalColor,topTier,pack_el,label,sub){
  const colorOrder=['white','blue','green','red','gold','rainbow'];
  const finalIdx=colorOrder.indexOf(finalColor);
  // 白から最終色まで段階的に変化
  for(let i=0;i<=finalIdx;i++){
    if(gachaSkipped)return;
    setPackColor(colorOrder[i]);
    label.textContent=getColorLabel(colorOrder[i]);
    sub.textContent='期待度上昇中...';
    await sleep(i===finalIdx?800:400);
    if(i<finalIdx&&Math.random()<0.3){
      // たまに一段下がってから上がる（ドキドキ演出）
      setPackColor(colorOrder[Math.max(0,i-1)]);
      await sleep(200);
    }
  }
}

async function puchunSequence(finalColor,topTier,pack_el,label,sub){
  label.textContent='プチュン...';
  sub.textContent='💓';
  setPackColor('white');
  await sleep(400);
  // プチュン発生
  const pw=document.getElementById('puchun-wrap');
  pw.innerHTML='<div class="puchun-heart">💓</div>';
  await sleep(300);
  pw.innerHTML='';
  // ドックン演出
  const dw=document.getElementById('dokkun-wrap');
  dw.style.display='flex';
  const dokkun_count=['sr','sar'].includes(topTier)?2:1;
  label.textContent='ドックン！';
  for(let i=0;i<dokkun_count;i++){
    if(gachaSkipped)break;
    dw.innerHTML=`<div class="dokkun-char">💗</div><div class="dokkun-text">ドックン${i+1}回目！</div>`;
    await sleep(600);
  }
  dw.style.display='none';
  // 最終色へ
  setPackColor(finalColor);
  label.textContent=getColorLabel(finalColor);
  sub.textContent=dokkun_count>=2?'🎊 大チャンス！':'期待度アップ！';
  await sleep(800);
}

async function rewindSequence(finalColor,topTier,pack_el,label,sub){
  // 一度ハズレ演出
  setPackColor('white');
  label.textContent='残念...';
  sub.textContent='ハズレ？';
  await sleep(600);
  if(gachaSkipped)return;
  // 巻き戻し発動！
  const ro=document.getElementById('rewind-overlay');
  ro.style.display='flex';
  label.textContent='REWIND!!';
  sub.textContent='逆転演出！';
  await sleep(900);
  ro.style.display='none';
  // 最終色へ一気に変化
  setPackColor(finalColor);
  label.textContent='🔥 復活！'+getColorLabel(finalColor);
  sub.textContent='逆転大当たり！！';
  await sleep(800);
}

function setPackColor(color){
  const pack_el=document.getElementById('gacha-pack');
  pack_el.className='gacha-pack col-'+color;
  // インジケーター更新
  document.querySelectorAll('.ci-dot').forEach(d=>{
    d.classList.toggle('active',d.dataset.col===color);

}

function getColorLabel(color){
  const labels={white:'白…',blue:'青！期待！',green:'緑！チャンス！',red:'赤！激アツ！',gold:'金！大当たり！',rainbow:'虹！！！最高演出！！！'};

}

function showGachaResult(results,pack,topTier){

const tierPillClass={sar:'tp-s',sr:'tp-a',rr:'tp-b',r:'tp-c',c:'tp-c'};
const ribbonClass={hot:'ribbon-hot',new:'ribbon-new',limit:'ribbon-limit'};

function generateSeed(){return Math.random().toString(36).slice(2).repeat(3)}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

function pickPrize(prizes,rng){
  const total=prizes.reduce((s,p)=>s+p.weight,0);
  let t=rng*total;
  for(const p of prizes){t-=p.weight;if(t<=0)return p;}
  return prizes[prizes.length-1];
}

function openDrawModal(packId,defaultCount){
  const pack=state.packs.find(p=>p.id===packId);
  if(!pack)return;
  state.activePack=pack;state.drawCount=defaultCount;
  document.getElementById('bs-icon').textContent=pack.emoji||'🎴';
  document.getElementById('bs-name').textContent=pack.name;
  document.getElementById('bs-series').textContent=pack.series||'';
  document.getElementById('bs-prizes').innerHTML=(pack.prizes||[]).map(pr=>`
    <div class="bs-prize">
      <span class="bsp-tier bsp-${pr.tier==='sar'?'s':pr.tier==='sr'?'a':pr.tier==='rr'?'b':'c'}">${pr.tier_label}</span>
      <span class="bsp-name">${pr.name}</span>
      <span class="bsp-cnt">×${pr.quantity}枚</span>
    </div>`).join('');
  document.getElementById('count-opts').innerHTML=[
    {n:1,bonus:null},{n:5,bonus:'5連割引'},{n:10,bonus:'確定アド'}
  ].map(o=>`
    <div class="count-opt ${o.n===defaultCount?'sel':''}" onclick="pickDrawCount(this,${o.n})">
      <div class="co-num">${o.n}</div>
      <div class="co-price">${(pack.price*o.n).toLocaleString()}${pack.currency==='coin'?'コイン':'JP'}</div>
      ${o.bonus?`<div class="co-bonus">${o.bonus}</div>`:''}
    </div>`).join('');
  document.getElementById('draw-modal').classList.add('show');
}

function closeDrawModal(){document.getElementById('draw-modal').classList.remove('show')}
function pickDrawCount(el,n){
  document.querySelectorAll('.count-opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');state.drawCount=n;
}

async function executeDraw(){
  const pack=state.activePack;
  if(!pack)return;
  if(!state.user){
    closeDrawModal();
    document.getElementById('auth-modal').classList.add('show');
    showToast('ガチャを引くにはログインが必要です');
    return;
  }
  const cost=pack.price*state.drawCount;
  const balance=pack.currency==='coin'?state.coin:state.jp;
  if(balance<cost){
    showToast('💎 ポイントが不足しています');
    closeDrawModal();openPurchase();return;
  }
  if(pack.currency==='coin')state.coin-=cost;
  else state.jp-=cost;
  updateHeaderPts();
  closeDrawModal();
  const prizes=pack.prizes||[];
  const results=Array.from({length:state.drawCount},()=>({prize:pickPrize(prizes,Math.random())}));
  await saveDrawSession(pack.id,results,cost,pack.currency);
  state.dp+=Math.floor(cost*0.05);state.totalSpent+=cost;
  state.sessions.unshift({
    packName:pack.name,results,cost,
    currency:pack.currency,date:new Date().toLocaleString('ja-JP'),
  });
  // DOPA風演出スタート
  startGachaAnimation(results,pack);
}

  if(state.user){
    await db.from('users').update({jp_points:state.jp}).eq('id',state.user.id);
    await db.from('point_purchases').insert({
      user_id:state.user.id,amount_jpy:plan.jpy,
      jp_points:plan.jp,bonus_points:plan.bonus,status:'completed',
    });

  updateHeaderPts();closePurchase();

  document.getElementById('auth-form-register').style.display=mode==='register'?'block':'none';
}
function closeAllModals(){
  document.querySelectorAll('.modal-overlay').forEach(m=>m.classList.remove('show'));
}
document.querySelectorAll('.bnav-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    const page=btn.dataset.page;
    document.getElementById(`page-${page}`)?.classList.add('active');
    if(page==='mypage')renderMyPage();
    if(page==='report')renderReportPage();
    if(page==='history')renderHistory();
  });
});
document.querySelectorAll('.cat-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    state.currentCat=tab.dataset.cat;renderPacks();
  });
});
document.querySelectorAll('.sort-chip').forEach(chip=>{
  chip.addEventListener('click',()=>{
    document.querySelectorAll('.sort-chip').forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
    state.currentSort=chip.dataset.sort;renderPacks();
  });
});
document.querySelectorAll('.modal-overlay').forEach(overlay=>{
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.classList.remove('show');});
});

/* ══════════════════════════════════════
   起動
══════════════════════════════════════ */
(async()=>{
  renderTicker();
  await checkSession();
  await loadAndRenderPacks();
})();
</script>
</body>
</html>
