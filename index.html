<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>オリパMAX | ネットオリパ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{background:#f2f2f2;color:#1a1a1a;font-family:'Noto Sans JP',sans-serif;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:68px}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input{font-family:inherit;outline:none}
::-webkit-scrollbar{display:none}
:root{
  --gold:#e8a800;--gold2:#c88000;
  --red:#e82020;--red2:#c00000;
  --green:#00b050;--blue:#0066cc;
  --bg:#f2f2f2;--card:#fff;
  --border:#e8e8e8;
  --text:#1a1a1a;--text2:#555;--text3:#999;
}

/* TOAST */
#toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:9px 20px;border-radius:999px;font-size:.82rem;font-weight:700;z-index:9999;opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap}
#toast.show{opacity:1}

/* HEADER */
.header{position:sticky;top:0;z-index:100;background:#fff;height:56px;display:flex;align-items:center;padding:0 12px;gap:8px;border-bottom:1px solid var(--border);box-shadow:0 1px 6px rgba(0,0,0,.06)}
.h-logo{font-size:1.45rem;font-weight:900;color:var(--gold);flex:1;display:flex;align-items:center;gap:4px}
.h-logo .logo-mark{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;font-size:.65rem;font-weight:900;padding:2px 6px;border-radius:4px}
.h-currencies{display:flex;align-items:center;gap:6px}
.h-cur{display:flex;align-items:center;gap:4px;background:#f5f5f5;border-radius:999px;padding:4px 10px;cursor:pointer;border:1px solid var(--border)}
.h-cur .cur-icon{font-size:1rem}
.h-cur .cur-val{font-size:.85rem;font-weight:900;color:var(--text)}
.h-cur .cur-label{background:linear-gradient(135deg,#cc0000,#ff2222);color:#fff;font-size:.5rem;font-weight:900;padding:1px 4px;border-radius:3px}
.h-add-btn{background:linear-gradient(135deg,var(--red),var(--red2));color:#fff;width:22px;height:22px;border-radius:50%;font-size:.9rem;font-weight:900;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(200,0,0,.3)}
.h-notif{position:relative;background:none;padding:6px;color:var(--text3);font-size:1.25rem}
.h-notif-dot{position:absolute;top:4px;right:4px;width:7px;height:7px;background:var(--red);border-radius:50%;border:1.5px solid #fff}

/* CAT TABS */
.cat-bar{position:sticky;top:56px;z-index:99;background:#fff;display:flex;border-bottom:2px solid var(--border);overflow-x:auto;height:44px}
.cat-tab{flex-shrink:0;padding:0 16px;height:100%;display:flex;align-items:center;font-size:.88rem;font-weight:700;color:var(--text3);background:none;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:.15s}
.cat-tab.active{color:var(--gold);border-color:var(--gold)}

/* ALERT */
.alert-bar{background:linear-gradient(90deg,#dd1100,#ff4400,#ff6600);color:#fff;padding:7px 12px;font-size:.8rem;font-weight:700;display:flex;align-items:center;gap:5px}

/* SORT */
.sort-bar{background:#fff;padding:8px 10px;display:flex;gap:6px;overflow-x:auto;border-bottom:1px solid var(--border)}
.sort-chip{flex-shrink:0;padding:4px 12px;border-radius:999px;font-size:.75rem;font-weight:700;background:#f5f5f5;color:var(--text2);border:1px solid var(--border);transition:.15s}
.sort-chip.active{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;border-color:transparent}

/* WINS TICKER */
.wins-bar{background:#fff8e0;border-bottom:1px solid #f0e0a0;padding:6px 0;overflow:hidden}
.wins-track{display:flex;animation:winscroll 22s linear infinite;white-space:nowrap}
.wins-item{display:inline-flex;align-items:center;gap:6px;padding:0 20px;font-size:.75rem;font-weight:700;color:#665500}
.wi-badge{font-size:.6rem;font-weight:900;padding:1px 5px;border-radius:2px}
.wi-sar{background:#e8a800;color:#fff}
.wi-sr{background:#8800cc;color:#fff}
.wi-rr{background:#0066cc;color:#fff}
@keyframes winscroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* PACK CARD */
.packs-list{padding:8px}
.pack-card{background:#fff;border-radius:14px;margin-bottom:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);border:1px solid var(--border);cursor:pointer;transition:transform .12s}
.pack-card:active{transform:scale(.99)}
.pc-banner{width:100%;min-height:210px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end}
.pcb-bg{position:absolute;inset:0;z-index:0}
.pcb-bg::after{content:'';position:absolute;bottom:0;left:0;right:0;height:60%;background:linear-gradient(transparent,rgba(0,0,0,.55))}
.pcb-shine{position:absolute;inset:0;z-index:1;background:linear-gradient(135deg,rgba(255,255,255,.08) 0%,transparent 50%,rgba(255,255,255,.04) 100%)}
.pcb-char{position:absolute;right:12px;bottom:48px;z-index:3;font-size:6rem;line-height:1;filter:drop-shadow(2px 6px 14px rgba(0,0,0,.5));animation:flt 3.5s ease-in-out infinite}
@keyframes flt{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-8px) rotate(2deg)}}
.pcb-content{position:relative;z-index:4;padding:12px 14px 10px;display:flex;flex-direction:column;gap:5px}
.pcb-ribbon{display:inline-flex;align-items:center;font-size:.65rem;font-weight:900;letter-spacing:.07em;padding:3px 16px 3px 8px;border-radius:3px;align-self:flex-start;clip-path:polygon(0 0,calc(100% - 5px) 0,100% 50%,calc(100% - 5px) 100%,0 100%)}
.ribbon-hot{background:linear-gradient(90deg,#cc0000,#ff3300);color:#ffe}
.ribbon-new{background:linear-gradient(90deg,#0055cc,#0088ff);color:#fff}
.ribbon-limit{background:linear-gradient(90deg,#660099,#aa00ee);color:#fff}
.pcb-top-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.pcb-name{font-size:1.5rem;font-weight:900;color:#fff;line-height:1.15;text-shadow:1px 2px 6px rgba(0,0,0,.5)}
.pcb-series{font-size:.72rem;font-weight:700;color:rgba(255,255,240,.75);text-shadow:1px 1px 3px rgba(0,0,0,.4);margin-top:2px}
.pcb-rate{display:flex;flex-direction:column;align-items:center;background:rgba(0,0,0,.35);border:1.5px solid rgba(255,220,80,.5);border-radius:8px;padding:4px 8px;flex-shrink:0;backdrop-filter:blur(4px);min-width:60px}
.pcb-rate-label{font-size:.52rem;color:rgba(255,220,80,.8);font-weight:700}
.pcb-rate-num{font-size:1.55rem;font-weight:900;line-height:1;color:#ffe566;text-shadow:0 0 10px rgba(255,200,0,.5)}
.pcb-rate-unit{font-size:.58rem;color:rgba(255,210,80,.8);font-weight:700}
.pcb-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:2px}
.pcb-chip{display:flex;align-items:center;gap:4px;background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:3px 9px;backdrop-filter:blur(3px)}
.pcb-chip span{font-size:.67rem;font-weight:700;color:rgba(255,255,220,.9)}
.pcb-tiers{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
.tier-pill{font-size:.6rem;font-weight:900;padding:2px 7px;border-radius:3px}
.tp-s{background:rgba(255,200,0,.2);color:#ffe08a;border:1px solid rgba(255,200,0,.35)}
.tp-a{background:rgba(180,80,255,.2);color:#dda8ff;border:1px solid rgba(180,80,255,.35)}
.tp-b{background:rgba(0,170,255,.15);color:#88ddff;border:1px solid rgba(0,170,255,.3)}
.tp-c{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.15)}
.pc-bottom{padding:10px 12px 12px}
.pc-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.pc-price{font-size:1.2rem;font-weight:900;color:var(--text)}
.pc-price-unit{font-size:.7rem;color:var(--text3);font-weight:700}
.pc-remain{font-size:.78rem;font-weight:700;color:var(--text2)}
.pc-remain b{color:var(--red)}
.progress-bg{background:#eaeaea;border-radius:999px;height:7px;overflow:hidden;margin-bottom:10px;position:relative}
.progress-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#00bb44,#00ee66);position:relative;overflow:hidden;transition:.5s}
.progress-fill.warn{background:linear-gradient(90deg,#ee8800,#ffaa00)}
.progress-fill.danger{background:linear-gradient(90deg,#dd0000,#ff3300)}
.progress-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);animation:shimmer 1.8s infinite}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(200%)}}
.pc-btns{display:flex;gap:7px}
.pc-btn-1{flex:1;padding:12px 6px;border-radius:10px;font-size:.95rem;font-weight:900;background:linear-gradient(160deg,#f5c800,#e0a000);color:#fff;box-shadow:0 3px 10px rgba(200,140,0,.3),inset 0 1px 0 rgba(255,255,255,.25);text-shadow:0 1px 2px rgba(0,0,0,.2);position:relative;overflow:hidden;transition:.1s}
.pc-btn-1::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.15) 0%,transparent 55%)}
.pc-btn-1:active{transform:scale(.97)}
.pc-btn-5{flex:1;padding:12px 6px;border-radius:10px;font-size:.95rem;font-weight:900;background:linear-gradient(160deg,#ff3333,#cc0000);color:#fff;box-shadow:0 3px 10px rgba(200,0,0,.3),inset 0 1px 0 rgba(255,255,255,.2);text-shadow:0 1px 2px rgba(0,0,0,.2);position:relative;overflow:hidden;transition:.1s}
.pc-btn-5::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.12) 0%,transparent 55%)}
.pc-btn-5:active{transform:scale(.97)}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;flex-direction:column;gap:16px}
.spinner{width:36px;height:36px;border-radius:50%;border:3px solid rgba(232,168,0,.2);border-top-color:var(--gold);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.show{opacity:1;pointer-events:all}
.bottom-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:0 0 28px;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:90vh;overflow-y:auto}
.modal-overlay.show .bottom-sheet{transform:translateY(0)}
.bs-drag{width:40px;height:4px;background:#ddd;border-radius:2px;margin:14px auto 0}
.bs-hero{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.bs-hero-icon{font-size:2.4rem}
.bs-pack-name{font-size:1.05rem;font-weight:900}
.bs-pack-series{font-size:.74rem;color:var(--text3);margin-top:2px}
.bs-section-label{padding:12px 16px 6px;font-size:.68rem;font-weight:900;letter-spacing:.1em;color:var(--text3);text-transform:uppercase}
.bs-prizes{display:flex;flex-wrap:wrap;gap:6px;padding:0 16px 12px;border-bottom:1px solid var(--border)}
.bs-prize{background:#f8f8f8;border:1px solid #ebebeb;border-radius:7px;padding:5px 10px;display:flex;align-items:center;gap:6px}
.bsp-tier{font-size:.58rem;font-weight:900;padding:1px 5px;border-radius:2px}
.bsp-s{background:#fff3cc;color:#9a6000;border:1px solid #e8c040}
.bsp-a{background:#f0e8ff;color:#660099;border:1px solid #c080ff}
.bsp-b{background:#e0f0ff;color:#004488;border:1px solid #80b8ff}
.bsp-c{background:#f0f0f0;color:#888;border:1px solid #ddd}
.bsp-name{font-size:.76rem;font-weight:700}
.bsp-cnt{font-size:.65rem;color:var(--text3)}
.count-opts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;padding:8px 16px 12px;border-bottom:1px solid var(--border)}
.count-opt{background:#f8f8f8;border:1.5px solid #e0e0e0;border-radius:10px;padding:10px 5px;text-align:center;cursor:pointer;transition:.15s}
.count-opt.sel{border-color:var(--gold);background:#fffbee}
.co-num{font-size:1.6rem;font-weight:900;color:var(--gold);line-height:1}
.co-price{font-size:.7rem;color:var(--text2);margin-top:2px;font-weight:700}
.co-bonus{font-size:.58rem;color:var(--green);font-weight:800;margin-top:1px}
.bs-draw-btn{margin:10px 16px 0;width:calc(100% - 32px);background:linear-gradient(160deg,#ff3333,#cc0000);color:#fff;font-size:1rem;font-weight:900;padding:14px;border-radius:12px;box-shadow:0 4px 16px rgba(200,0,0,.25);letter-spacing:.02em;transition:.1s}
.bs-draw-btn:active{transform:scale(.98)}
.bs-cancel-btn{width:100%;padding:12px;margin-top:6px;background:none;color:var(--text3);font-size:.85rem;font-weight:700}

/* AUTH */
.auth-sheet{max-height:85vh}
.auth-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:0}
.auth-tab{flex:1;padding:12px;text-align:center;font-size:.9rem;font-weight:700;color:var(--text3);background:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s}
.auth-tab.active{color:var(--gold);border-color:var(--gold)}
.auth-form{padding:16px}
.auth-label{font-size:.75rem;font-weight:700;color:var(--text2);margin-bottom:4px;display:block}
.auth-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:.9rem;color:var(--text);transition:.2s;margin-bottom:12px}
.auth-input:focus{border-color:var(--gold)}
.auth-submit{width:100%;padding:13px;border-radius:10px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;font-size:.95rem;font-weight:900;box-shadow:0 3px 12px rgba(200,140,0,.3);margin-top:4px;transition:.1s}
.auth-submit:active{transform:scale(.98)}
.auth-divider{text-align:center;font-size:.75rem;color:var(--text3);margin:12px 0;position:relative}
.auth-divider::before,.auth-divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border)}
.auth-divider::before{left:0}.auth-divider::after{right:0}
.auth-sns-btn{width:100%;padding:11px;border-radius:10px;border:1.5px solid var(--border);background:#fff;font-size:.88rem;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px}

/* PURCHASE */
.plan-item{display:flex;align-items:center;justify-content:space-between;background:#f8f8f8;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;margin-bottom:8px;cursor:pointer;transition:.15s}
.plan-item:hover,.plan-item.popular{border-color:var(--gold);background:#fffce8}
.plan-jp{font-size:1.1rem;font-weight:900}
.plan-bonus{font-size:.7rem;color:var(--green);font-weight:700;margin-top:1px}
.plan-badge{background:var(--red);color:#fff;font-size:.55rem;font-weight:900;padding:1px 5px;border-radius:2px;margin-left:6px}
.plan-price{font-size:.95rem;font-weight:900;color:var(--text);text-align:right}
.plan-per{font-size:.65rem;color:var(--text3);margin-top:1px}

/* REVEAL */
.reveal-screen{position:fixed;inset:0;z-index:300;background:#08080f;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;opacity:0;pointer-events:none;transition:.3s}
.reveal-screen.show{opacity:1;pointer-events:all}
.rv-title{font-size:1rem;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:.1em;text-align:center}
.rv-cards{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:440px;padding:0 12px}
.rv-card{width:100px;height:140px;perspective:500px;cursor:pointer;flex-shrink:0}
.rv-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .65s cubic-bezier(.4,0,.2,1);border-radius:9px}
.rv-card.done .rv-inner{transform:rotateY(180deg)}
.rv-back,.rv-front{position:absolute;inset:0;backface-visibility:hidden;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.rv-back{background:linear-gradient(145deg,#14142a,#0a0a1e);border:1.5px solid rgba(232,168,0,.3);font-size:2.6rem;box-shadow:0 4px 18px rgba(0,0,0,.5)}
.rv-back::before{content:'';position:absolute;inset:5px;border:1px solid rgba(232,168,0,.1);border-radius:6px}
.rv-front{border-width:2px;border-style:solid;transform:rotateY(180deg)}
.rv-emoji{font-size:1.8rem;z-index:1}
.rv-name{font-size:.52rem;font-weight:900;text-align:center;padding:0 4px;z-index:1;line-height:1.3}
.rv-tier{font-size:.48rem;z-index:1;opacity:.7}
.rf-sar{background:linear-gradient(145deg,#1c1600,#2e2400);border-color:#e8a800;box-shadow:0 0 28px rgba(232,168,0,.4)}
.rf-sar .rv-emoji,.rf-sar .rv-name{color:#e8a800}
.rf-sr{background:linear-gradient(145deg,#0e0020,#1a0035);border-color:#b066ff;box-shadow:0 0 22px rgba(176,102,255,.35)}
.rf-sr .rv-emoji,.rf-sr .rv-name{color:#cc88ff}
.rf-rr{background:linear-gradient(145deg,#001626,#002040);border-color:#0088cc}
.rf-rr .rv-emoji,.rf-rr .rv-name{color:#44ccee}
.rf-r{background:linear-gradient(145deg,#0a1020,#101830);border-color:#446699}
.rf-r .rv-emoji,.rf-r .rv-name{color:#8899cc}
.rf-c{background:linear-gradient(145deg,#101012,#181818);border-color:#383840}
.rf-c .rv-emoji,.rf-c .rv-name{color:#666680}
.rv-done-btn{background:linear-gradient(160deg,#f5c800,#e0a000);color:#fff;font-size:.95rem;font-weight:900;padding:13px 48px;border-radius:12px;box-shadow:0 4px 16px rgba(200,140,0,.35);display:none}
.rv-done-btn.show{display:block;animation:pop .3s ease-out}
@keyframes pop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}

/* SAR FLASH */
.sar-flash{position:fixed;inset:0;z-index:500;pointer-events:none;opacity:0;background:radial-gradient(ellipse at 50% 45%,rgba(255,200,0,.55) 0%,transparent 65%)}
.sar-flash.go{animation:sarflash .9s ease-out forwards}
@keyframes sarflash{0%{opacity:1}100%{opacity:0;transform:scale(1.07)}}

/* MYPAGE */
.mypage{padding:16px}
.mp-user-card{background:linear-gradient(135deg,#1a1000,#2a1800,#3a2800);border-radius:14px;padding:18px;margin-bottom:14px;color:#fff;position:relative;overflow:hidden}
.mp-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin-bottom:10px}
.mp-username{font-size:1.1rem;font-weight:900;margin-bottom:3px}
.mp-rank{font-size:.72rem;color:rgba(255,200,80,.8);font-weight:700}
.mp-pts-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
.mp-pt{background:rgba(0,0,0,.25);border-radius:8px;padding:8px;text-align:center}
.mp-pt-label{font-size:.6rem;color:rgba(255,255,255,.5);font-weight:700;margin-bottom:2px}
.mp-pt-val{font-size:1.05rem;font-weight:900;color:#ffd740}
.mp-menu{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.06);border:1px solid var(--border);margin-top:14px}
.mp-menu-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);font-size:.88rem;font-weight:700;cursor:pointer;transition:.15s}
.mp-menu-item:last-child{border:none}
.mp-menu-item:active{background:#f5f5f5}
.mp-menu-icon{font-size:1.2rem;width:28px;text-align:center}
.mp-menu-arrow{margin-left:auto;color:var(--text3)}

/* HISTORY */
.history-page{padding:8px}
.hist-empty{text-align:center;padding:48px 16px;color:var(--text3)}
.hist-card{background:#fff;border-radius:10px;border:1px solid var(--border);padding:12px 14px;margin-bottom:7px;box-shadow:0 1px 5px rgba(0,0,0,.05)}
.hist-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.hist-pack{font-size:.82rem;font-weight:900}
.hist-time{font-size:.68rem;color:var(--text3)}
.hist-results{display:flex;gap:5px;flex-wrap:wrap}
.hist-chip{font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:3px}
.hc-sar{background:#fff3cc;color:#9a6000;border:1px solid #e8c040}
.hc-sr{background:#f0e8ff;color:#660099;border:1px solid #c080ff}
.hc-rr{background:#e0f0ff;color:#004488;border:1px solid #80b8ff}
.hc-r{background:#f5f5f5;color:#555;border:1px solid #ddd}

<script>
/* ══════════════════════════════════════
   SUPABASE 関数
══════════════════════════════════════ */

// パック一覧をDBから取得
async function fetchPacks() {
  const { data, error } = await db
    .from('packs')
    .select('*, prizes(*)')
    .eq('is_active', true)
    .order('sort_order');
  if (error) { console.error(error); return []; }
  return data || [];
}

// 当選速報をDBから取得
async function fetchRecentWins() {
  const { data, error } = await db
    .from('draw_results')
    .select('*, prizes(tier, tier_label, name), users(username)')
    .in('prizes.tier', ['sar', 'sr'])
    .order('created_at', { ascending: false })
    .limit(10);
  if (error) return [];
  return data || [];
}

// ユーザー情報をDBから取得
async function fetchUserProfile(userId) {
  const { data, error } = await db
    .from('users')
    .select('*')
    .eq('id', userId)
    .single();
  if (error) return null;
  return data;
}

// 抽選実行（サーバーサイドロジック）
async function saveDrawSession(packId, results, totalCost, currency) {
  const serverSeed = generateSeed();

  // セッション保存
  const { data: session, error: sessionError } = await db
    .from('draw_sessions')
    .insert({
      user_id: state.user.id,
      pack_id: packId,
      draw_count: results.length,
      total_cost: totalCost,
      currency: currency,
      server_seed: serverSeed,
    })
    .select()
    .single();

  if (sessionError) { console.error(sessionError); return null; }

  // 結果保存
  const resultRows = results.map((r, i) => ({
    session_id: session.id,
    user_id: state.user.id,
    pack_id: packId,
    prize_id: r.prize.id,
    result_hash: generateSeed(),
  }));

  const { error: resultError } = await db
    .from('draw_results')
    .insert(resultRows);

  if (resultError) console.error(resultError);

  // ポイント消費をDBに反映
  const updateField = currency === 'coin' ? 'coin_points' : 'jp_points';
  await db
    .from('users')
    .update({
      [updateField]: state[currency === 'coin' ? 'coin' : 'jp'] - totalCost,
      dp_points: state.dp + Math.floor(totalCost * 0.05),
      total_spent: state.totalSpent + totalCost,
    })
    .eq('id', state.user.id);

  // 取引履歴
  await db.from('transactions').insert({
    user_id: state.user.id,
    type: 'draw',
    amount: -totalCost,
    currency: currency,
    description: `${state.activePack.name} × ${results.length}回`,
  });

  return session;
}

// 履歴をDBから取得
async function fetchHistory() {
  if (!state.user) return [];
  const { data, error } = await db
    .from('draw_sessions')
    .select('*, packs(name), draw_results(*, prizes(tier, name))')
    .eq('user_id', state.user.id)
    .order('created_at', { ascending: false })
    .limit(30);
  if (error) return [];
  return data || [];
}

/* ══════════════════════════════════════
   認証
══════════════════════════════════════ */
async function doLogin() {
  const email = document.getElementById('login-email').value;
  const pass  = document.getElementById('login-pass').value;
  if (!email || !pass) { showToast('⚠️ 入力してください'); return; }

  showToast('ログイン中...');
  const { data, error } = await db.auth.signInWithPassword({ email, password: pass });
  if (error) { showToast('⚠️ ' + error.message); return; }

  state.session = data.session;
  await loadUserProfile(data.user.id);
  closeAllModals();
  showToast('✅ ログインしました！');
}

async function doRegister() {
  const name  = document.getElementById('reg-name').value;
  const email = document.getElementById('reg-email').value;
  const pass  = document.getElementById('reg-pass').value;
  const birth = document.getElementById('reg-birth').value;

  if (!name || !email || !pass || !birth) { showToast('⚠️ 全項目を入力してください'); return; }
  const age = Math.floor((Date.now() - new Date(birth)) / (365.25 * 24 * 3600 * 1000));
  if (age < 18) { showToast('⚠️ 18歳未満は利用できません'); return; }

  showToast('登録中...');

  // Supabase Auth でアカウント作成
  const { data, error } = await db.auth.signUp({ email, password: pass });
  if (error) { showToast('⚠️ ' + error.message); return; }

  // usersテーブルにプロフィール保存
  await db.from('users').insert({
    id: data.user.id,
    email,
    username: name,
    password_hash: 'managed_by_supabase_auth',
    coin_points: 500,
    birth_date: birth,
  });

  state.session = data.session;
  await loadUserProfile(data.user.id);
  closeAllModals();
  showToast('🎉 登録完了！500コインプレゼント！', 3000);
}

async function loadUserProfile(userId) {
  const profile = await fetchUserProfile(userId);
  if (!profile) return;
  state.user = profile;
  state.jp   = profile.jp_points;
  state.coin = profile.coin_points;
  state.dp   = profile.dp_points;
  state.rank = profile.rank;
  state.totalSpent = profile.total_spent;
  updateHeaderPts();
}

async function doLogout() {
  await db.auth.signOut();
  state.user = null; state.jp = 0; state.coin = 0;
  updateHeaderPts();
  renderMyPage();
  showToast('ログアウトしました');
}

// ページ読み込み時にセッション確認
async function checkSession() {
  const { data: { session } } = await db.auth.getSession();
  if (session) {
    state.session = session;
    await loadUserProfile(session.user.id);
  }
}

/* ══════════════════════════════════════
   パック表示
══════════════════════════════════════ */
const rfClass = { sar:'rf-sar', sr:'rf-sr', rr:'rf-rr', r:'rf-r', c:'rf-c' };
const rarLabel = { sar:'SAR ✨', sr:'SR 💜', rr:'RR 💙', r:'R', c:'C' };
const tierPillClass = { sar:'tp-s', sr:'tp-a', rr:'tp-b', r:'tp-c', c:'tp-c' };
const ribbonClass = { hot:'ribbon-hot', new:'ribbon-new', limit:'ribbon-limit' };

async function loadAndRenderPacks() {
  const packs = await fetchPacks();
  state.packs = packs;
  renderPacks();
}

function getFilteredPacks() {
  let list = state.currentCat === 'all' ? state.packs : state.packs.filter(p => p.category === state.currentCat);
  if (state.currentSort === 'hot')   list = [...list].sort((a, b) => (b.is_hot ? 1 : 0) - (a.is_hot ? 1 : 0));
  if (state.currentSort === 'cheap') list = [...list].sort((a, b) => a.price - b.price);
  if (state.currentSort === 'ad')    list = list.filter(p => p.is_ad_confirm);
  return list;
}

function renderPacks() {
  const list = getFilteredPacks();
  if (!list.length) {
    document.getElementById('packs-list').innerHTML = `<div style="text-align:center;padding:48px 16px;color:var(--text3)"><div style="font-size:2rem;margin-bottom:10px">🎴</div>このカテゴリのオリパはありません</div>`;
    return;
  }
  document.getElementById('packs-list').innerHTML = list.map(p => {
    const pct = Math.round((p.remaining / p.total_slots) * 100);
    const barClass = pct < 10 ? 'danger' : pct < 30 ? 'warn' : '';
    const prizes = (p.prizes || []).filter(pr => ['sar','sr','rr'].includes(pr.tier));
    const tiers = prizes.map(pr => `<span class="tier-pill ${tierPillClass[pr.tier]}">${pr.tier_label} ${pr.quantity}枚</span>`).join('');
    return `
    <div class="pack-card" onclick="openDrawModal('${p.id}',1)">
      <div class="pc-banner">
        <div class="pcb-bg" style="background:${p.bg_style || 'linear-gradient(135deg,#333,#111)'}"></div>
        <div class="pcb-shine"></div>
        <div class="pcb-char">${p.emoji || '🎴'}</div>
        <div class="pcb-content">
          <span class="pcb-ribbon ${ribbonClass[p.ribbon_type] || 'ribbon-hot'}">${p.ribbon_text || 'HOT'}</span>
          <div class="pcb-top-row">
            <div>
              <div class="pcb-name">${p.name}</div>
              <div class="pcb-series">${p.series || ''}</div>
            </div>
            <div class="pcb-rate">
              <span class="pcb-rate-label">総還元率</span>
              <span class="pcb-rate-num">${p.return_rate || '-'}</span>
              <span class="pcb-rate-unit">%</span>
            </div>
          </div>
          ${p.odds_text ? `<div class="pcb-chips"><div class="pcb-chip"><span>${p.odds_text}</span></div></div>` : ''}
          <div class="pcb-tiers">${tiers}</div>
        </div>
      </div>
      <div class="pc-bottom">
        <div class="pc-meta">
          <div><span class="pc-price">${p.currency === 'coin' ? '🪙' : '💎'} ${p.price.toLocaleString()}</span><span class="pc-price-unit">/1回</span></div>
          <span class="pc-remain">残り<b>${p.remaining.toLocaleString()}</b>/${p.total_slots.toLocaleString()}口</span>
        </div>
        <div class="progress-bg"><div class="progress-fill ${barClass}" style="width:${pct}%"></div></div>
        <div class="pc-btns">
          <button class="pc-btn-1" onclick="event.stopPropagation();openDrawModal('${p.id}',1)">1回ガチャ</button>
          <button class="pc-btn-5" onclick="event.stopPropagation();openDrawModal('${p.id}',5)">5連ガチャ</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════
   抽選
══════════════════════════════════════ */
function openDrawModal(packId, defaultCount) {
  const pack = state.packs.find(p => p.id === packId);
  if (!pack) return;
  state.activePack = pack;
  state.drawCount  = defaultCount;
  document.getElementById('bs-icon').textContent   = pack.emoji || '🎴';
  document.getElementById('bs-name').textContent   = pack.name;
  document.getElementById('bs-series').textContent = pack.series || '';
  document.getElementById('bs-prizes').innerHTML = (pack.prizes || []).map(pr => `
    <div class="bs-prize">
      <span class="bsp-tier bsp-${pr.tier === 'sar' ? 's' : pr.tier === 'sr' ? 'a' : pr.tier === 'rr' ? 'b' : 'c'}">${pr.tier_label}</span>
      <span class="bsp-name">${pr.name}</span>
      <span class="bsp-cnt">×${pr.quantity}枚</span>
    </div>`).join('');
  document.getElementById('count-opts').innerHTML = [
    { n:1, bonus:null },
    { n:5, bonus:'5連割引' },
    { n:10, bonus:'確定アド' }
  ].map(o => `
    <div class="count-opt ${o.n === defaultCount ? 'sel' : ''}" onclick="pickDrawCount(this,${o.n})">
      <div class="co-num">${o.n}</div>
      <div class="co-price">${(pack.price * o.n).toLocaleString()}${pack.currency === 'coin' ? 'コイン' : 'JP'}</div>
      ${o.bonus ? `<div class="co-bonus">${o.bonus}</div>` : ''}
    </div>`).join('');
  document.getElementById('draw-modal').classList.add('show');
}

function closeDrawModal() { document.getElementById('draw-modal').classList.remove('show'); }
function pickDrawCount(el, n) {
  document.querySelectorAll('.count-opt').forEach(o => o.classList.remove('sel'));
  el.classList.add('sel');
  state.drawCount = n;
}

function pickPrize(prizes, rng) {
  const total = prizes.reduce((s, p) => s + p.weight, 0);
  let t = rng * total;
  for (const p of prizes) { t -= p.weight; if (t <= 0) return p; }
  return prizes[prizes.length - 1];
}

function generateSeed() { return Math.random().toString(36).slice(2).repeat(3); }

async function executeDraw() {
  const pack = state.activePack;
  if (!pack) return;

  // ログインチェック
  if (!state.user) {
    closeDrawModal();
    document.getElementById('auth-modal').classList.add('show');
    showToast('ガチャを引くにはログインが必要です');
    return;
  }

  const cost = pack.price * state.drawCount;
  const balance = pack.currency === 'coin' ? state.coin : state.jp;
  if (balance < cost) {
    showToast('💎 ポイントが不足しています');
    closeDrawModal();
    openPurchase();
    return;
  }

  // ポイント消費（先に画面更新）
  if (pack.currency === 'coin') state.coin -= cost;
  else state.jp -= cost;
  updateHeaderPts();
  closeDrawModal();

  // 抽選
  const prizes = pack.prizes || [];
  const results = Array.from({ length: state.drawCount }, () => {
    const rng = Math.random();
    return { prize: pickPrize(prizes, rng) };
  });

  // DBに保存
  await saveDrawSession(pack.id, results, cost, pack.currency);

  // DP更新
  state.dp += Math.floor(cost * 0.05);
  state.totalSpent += cost;

  // 開封画面
  showReveal(results, pack);

  // 履歴に追加
  state.sessions.unshift({
    packName: pack.name,
    results,
    cost,
    currency: pack.currency,
    date: new Date().toLocaleString('ja-JP'),
  });
}

/* ══════════════════════════════════════
   開封演出
══════════════════════════════════════ */
function showReveal(results, pack) {
  state.drawFlipped = 0;
  state.drawTotal   = results.length;
  document.getElementById('rv-title').textContent = 'カードをタップして開封！';
  document.getElementById('rv-hint').style.display = 'block';
  document.getElementById('rv-done').classList.remove('show');
  document.getElementById('rv-cards').innerHTML = results.map((r, i) => `
    <div class="rv-card" id="rvc-${i}" onclick="flipCard(${i},'${r.prize.tier}')">
      <div class="rv-inner">
        <div class="rv-back">🎴</div>
        <div class="rv-front ${rfClass[r.prize.tier] || 'rf-c'}">
          <span class="rv-emoji">${pack.emoji || '🎴'}</span>
          <span class="rv-name">${r.prize.name}</span>
          <span class="rv-tier">${rarLabel[r.prize.tier] || r.prize.tier}</span>
        </div>
      </div>
    </div>`).join('');
  document.getElementById('reveal-screen').classList.add('show');
}

function flipCard(i, tier) {
  const card = document.getElementById(`rvc-${i}`);
  if (card.classList.contains('done')) return;
  card.classList.add('done');
  state.drawFlipped++;
  if (tier === 'sar') {
    const f = document.getElementById('sar-flash');
    f.classList.remove('go'); void f.offsetWidth; f.classList.add('go');
    showToast('🎊 SAR当選！おめでとうございます！', 3000);
  }
  if (state.drawFlipped === state.drawTotal) {
    document.getElementById('rv-title').textContent = '🎊 開封完了！';
    document.getElementById('rv-hint').style.display = 'none';
    document.getElementById('rv-done').classList.add('show');
    renderHistory();
  }
}

function closeReveal() { document.getElementById('reveal-screen').classList.remove('show'); }

/* ══════════════════════════════════════
   チャージ
══════════════════════════════════════ */
const PLANS = [
  { id:'p100',  jpy:110,   jp:100,   bonus:0    },
  { id:'p500',  jpy:550,   jp:500,   bonus:50   },
  { id:'p1000', jpy:1100,  jp:1000,  bonus:150, popular:true },
  { id:'p3000', jpy:3300,  jp:3000,  bonus:600  },
  { id:'p5000', jpy:5500,  jp:5000,  bonus:1250 },
  { id:'p10000',jpy:11000, jp:10000, bonus:3000 },
];

function openPurchase() {
  document.getElementById('purchase-plans').innerHTML = PLANS.map(p => `
    <div class="plan-item ${p.popular ? 'popular' : ''}" onclick="doPurchase('${p.id}')">
      <div>
        ${p.popular ? '<div style="font-size:.62rem;font-weight:900;color:var(--gold2);margin-bottom:2px">⭐ 人気No.1</div>' : ''}
        <div class="plan-jp">💎 ${p.jp.toLocaleString()} JP${p.bonus ? `<span class="plan-badge">+${p.bonus}</span>` : ''}</div>
        ${p.bonus ? `<div class="plan-bonus">+${p.bonus}JPボーナス付き！</div>` : ''}
      </div>
      <div><div class="plan-price">¥${p.jpy.toLocaleString()}</div></div>
    </div>`).join('');
  document.getElementById('purchase-modal').classList.add('show');
}

function closePurchase() { document.getElementById('purchase-modal').classList.remove('show'); }

async function doPurchase(planId) {
  const plan = PLANS.find(p => p.id === planId);
  if (!plan) return;
  // 本番: Stripe決済へ飛ばす
  // 今はデモとして直接付与
  state.jp += plan.jp + plan.bonus;
  if (state.user) {
    await db.from('users').update({ jp_points: state.jp }).eq('id', state.user.id);
    await db.from('point_purchases').insert({
      user_id: state.user.id,
      amount_jpy: plan.jpy,
      jp_points: plan.jp,
      bonus_points: plan.bonus,
      status: 'completed',
    });
  }
  updateHeaderPts();
  closePurchase();
  showToast(`💎 ${(plan.jp + plan.bonus).toLocaleString()}JP チャージしました！`);
}

/* ══════════════════════════════════════
   マイページ
══════════════════════════════════════ */
function renderMyPage() {
  const content = document.getElementById('mypage-content');
  if (!state.user) {
    content.innerHTML = `
      <div style="text-align:center;padding:40px 0">
        <div style="font-size:3rem;margin-bottom:12px">🎴</div>
        <div style="font-size:1rem;font-weight:900;margin-bottom:6px">ログインして始めよう</div>
        <div style="font-size:.82rem;color:var(--text3);margin-bottom:20px">新規登録で500コイン無料！</div>
        <button onclick="document.getElementById('auth-modal').classList.add('show')"
          style="background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;padding:13px 40px;border-radius:12px;font-weight:900;font-size:.95rem">
          ログイン / 無料登録
        </button>
      </div>`;
    return;
  }
  content.innerHTML = `
    <div class="mp-user-card">
      <div class="mp-avatar">👤</div>
      <div class="mp-username">${state.user.username}</div>
      <div class="mp-rank">🏅 ${state.rank}</div>
      <div class="mp-pts-row">
        <div class="mp-pt"><div class="mp-pt-label">💎 JP</div><div class="mp-pt-val">${state.jp.toLocaleString()}</div></div>
        <div class="mp-pt"><div class="mp-pt-label">🪙 コイン</div><div class="mp-pt-val">${state.coin.toLocaleString()}</div></div>
        <div class="mp-pt"><div class="mp-pt-label">🔷 DP</div><div class="mp-pt-val">${state.dp.toLocaleString()}</div></div>
      </div>
    </div>
    <div class="mp-menu">
      <div class="mp-menu-item" onclick="openPurchase()"><span class="mp-menu-icon">💎</span>JPポイントをチャージ<span class="mp-menu-arrow">›</span></div>
      <div class="mp-menu-item" onclick="showToast('準備中')"><span class="mp-menu-icon">📦</span>発送依頼<span class="mp-menu-arrow">›</span></div>
      <div class="mp-menu-item" onclick="showToast('準備中')"><span class="mp-menu-icon">🔗</span>友達を招待<span class="mp-menu-arrow">›</span></div>
      <div class="mp-menu-item" onclick="doLogout()"><span class="mp-menu-icon">🚪</span>ログアウト<span class="mp-menu-arrow">›</span></div>
    </div>`;
}

/* ══════════════════════════════════════
   履歴
══════════════════════════════════════ */
function renderHistory() {
  const list = document.getElementById('history-list');
  if (!state.sessions.length) {
    list.innerHTML = `<div class="hist-empty"><div style="font-size:2.5rem;margin-bottom:12px">🕐</div><div style="font-weight:700">当選履歴はありません</div></div>`;
    return;
  }
  list.innerHTML = state.sessions.map(s => `
    <div class="hist-card">
      <div class="hist-top"><span class="hist-pack">${s.packName}</span><span class="hist-time">${s.date}</span></div>
      <div class="hist-results">${s.results.map(r => `<span class="hist-chip hc-${r.prize.tier}">${r.prize.name}</span>`).join('')}</div>
      <div class="hist-cost">消費: ${s.cost.toLocaleString()} ${s.currency === 'coin' ? 'コイン' : 'JP'}</div>
    </div>`).join('');
}

/* ══════════════════════════════════════
   当選報告
══════════════════════════════════════ */
async function renderReportPage() {
  const wins = await fetchRecentWins();
  const fallback = [
    { username:'ゆず***', prize:{ tier:'sar', name:'リザードン ex SAR' }, emoji:'🦎', time:'たった今' },
    { username:'たか***', prize:{ tier:'sar', name:'マックピカチュウ SAR' }, emoji:'⚡', time:'3分前' },
    { username:'みく***', prize:{ tier:'sr',  name:'ピカチュウ SR' }, emoji:'⭐', time:'5分前' },
  ];
  const data = wins.length ? wins : fallback;
  document.getElementById('report-list').innerHTML = data.map(w => `
    <div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:7px;display:flex;align-items:center;gap:10px">
      <span style="font-size:1.8rem">${w.emoji || '🎴'}</span>
      <div style="flex:1">
        <div style="font-size:.82rem;font-weight:900">${w.username || (w.users?.username?.slice(0,3) + '***')} さん</div>
        <div style="font-size:.75rem;color:var(--text2)">${w.prize?.name || (w.prizes?.name)} を当てました🎊</div>
      </div>
    </div>`).join('');
}

/* ══════════════════════════════════════
   当選ティッカー
══════════════════════════════════════ */
function renderTicker() {
  const wins = [
    { r:'sar', user:'ゆず***', card:'リザードン ex SAR' },
    { r:'sar', user:'たか***', card:'マックピカチュウ SAR' },
    { r:'sr',  user:'みく***', card:'ピカチュウ SR' },
    { r:'sar', user:'そう***', card:'PSA10 リーリエ' },
    { r:'sr',  user:'はる***', card:'ブラッキー SR' },
  ];
  const items = [...wins, ...wins].map(w =>
    `<span class="wins-item"><span class="wi-badge wi-${w.r}">${w.r.toUpperCase()}</span>${w.user} さんが「${w.card}」を当てました！🎉</span>`
  ).join('');
  document.getElementById('wins-track').innerHTML = items;
}

/* ══════════════════════════════════════
   ユーティリティ
══════════════════════════════════════ */
function showToast(msg, dur = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function updateHeaderPts() {
  document.getElementById('h-jp').textContent   = state.jp.toLocaleString();
  document.getElementById('h-coin').textContent = state.coin.toLocaleString();
}

function switchAuth(mode) {
  document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (mode === 'login')));
  document.getElementById('auth-form-login').style.display    = mode === 'login'    ? 'block' : 'none';
  document.getElementById('auth-form-register').style.display = mode === 'register' ? 'block' : 'none';
}

function closeAllModals() {
  document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('show'));
}

// ナビゲーション
document.querySelectorAll('.bnav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    const page = btn.dataset.page;
    document.getElementById(`page-${page}`)?.classList.add('active');
    if (page === 'mypage') renderMyPage();
    if (page === 'report') renderReportPage();
    if (page === 'history') renderHistory();
  });
});

// カテゴリタブ
document.querySelectorAll('.cat-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    state.currentCat = tab.dataset.cat;
    renderPacks();
  });
});

// ソート
document.querySelectorAll('.sort-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.sort-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    state.currentSort = chip.dataset.sort;
    renderPacks();
  });
});

// モーダル背景タップで閉じる
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('show'); });
});

/* ══════════════════════════════════════
   起動
══════════════════════════════════════ */
(async () => {
  renderTicker();
  await checkSession();
  await loadAndRenderPacks();
})();
</script>
